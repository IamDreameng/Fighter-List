<!DOCTYPE html>

<head>

    <!-- WEBSITE ICON (FAVICON) -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .selection-brand::selection { background: #d7df22; color: black; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideIn 0.3s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-white text-black selection-brand overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = "https://eahymntxxgflqkogdfxs.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhaHltbnR4eGdmbHFrb2dkZnhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTYzODEsImV4cCI6MjA5MTEzMjM4MX0.Tg4VEgCcWHtcZYyrXcMILd3jsf8jFDM9twPL-yX8R_s"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const InstagramIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        );

        const WhatsAppIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        );

        const XIcon = ({ size = 14 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
        );

        const FBIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        );

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const CopyButton = ({ text, size = 10, showText = false, customStyle = "" }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = (e) => {
                e.stopPropagation();
                const textArea = document.body.appendChild(document.createElement("textarea"));
                textArea.value = text;
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={handleCopy} className={`flex items-center gap-1.5 px-2 py-1 rounded-lg transition-all active:scale-95 ${customStyle || (copied ? 'bg-green-50' : 'hover:bg-gray-100')}`}>
                    {showText && <span className={`text-[8px] font-black uppercase ${copied ? 'text-green-600' : 'text-gray-400'}`}>{copied ? 'Copied!' : 'Copy'}</span>}
                    <Icon name={copied ? "check" : "copy"} size={size} className={copied ? "text-green-500" : "text-gray-400"} />
                </button>
            );
        };

        const MetricBar = ({ label, value, icon, color = "bg-black" }) => (
            <div className="space-y-1.5 text-left">
                <div className="flex justify-between items-center font-black uppercase tracking-widest text-gray-500 text-[10px]">
                    <div className="flex items-center gap-1.5"><Icon name={icon} size={12} className={icon === 'heart' ? 'text-red-500 fill-red-500' : ''}/>{label}</div>
                    <span className="text-black font-black">{value || 0}%</span>
                </div>
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${value || 0}%` }} />
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState("gyms"); 
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCity, setActiveCity] = useState("Where");
            const [activeType, setActiveType] = useState("All");
            const [selectedGym, setSelectedGym] = useState(null);
            const [showPassport, setShowPassport] = useState(false);
            const [revealedSponsors, setRevealedSponsors] = useState(new Set());
            const [revealedFights, setRevealedFights] = useState(new Set());
            const [shareMenuFightId, setShareMenuFightId] = useState(null);
            const [socialExpand, setSocialExpand] = useState(null); 
            const [viewedAthlete, setViewedAthlete] = useState(null); 

            const [gyms, setGyms] = useState([]);
            const [fights, setFights] = useState([]);
            const [gear, setGear] = useState([]);
            const [sponsors, setSponsors] = useState([]);
            const [profiles, setProfiles] = useState([]);
            
            // Auth States
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [confirmPassword, setConfirmPassword] = useState("");
            const [fullName, setFullName] = useState("");
            const [authError, setAuthError] = useState("");
            const [isLogin, setIsLogin] = useState(true);

            // Profile Edit States
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [editHomeGym, setEditHomeGym] = useState("");
            const [editCurrentGym, setEditCurrentGym] = useState("");
            const [editPlannedGyms, setEditPlannedGyms] = useState("");
            const [editVisitedGyms, setEditVisitedGyms] = useState("");

            // Dynamic unique cities for the "Where" filter
            const dynamicCities = useMemo(() => {
                const gymLocs = gyms.map(g => g.city_country || g.city || g.location).filter(Boolean);
                const fightLocs = fights.map(f => f.city || f.location).filter(Boolean);
                return [...new Set([...gymLocs, ...fightLocs])].sort();
            }, [gyms, fights]);

            const sortGyms = (data) => {
                return [...data].sort((a, b) => {
                    const aName = a.name?.toLowerCase() || "";
                    const bName = b.name?.toLowerCase() || "";
                    if (aName.includes("bangtao") && !bName.includes("bangtao")) return -1;
                    if (!aName.includes("bangtao") && bName.includes("bangtao")) return 1;
                    return (b.upvotes || 0) - (a.upvotes || 0) || aName.localeCompare(bName);
                });
            };

            const loadData = async () => {
                setLoading(true);
                const [gymRes, fightRes, gearRes, sponsorRes, profileRes] = await Promise.all([
                    supabase.from('gyms').select('*'),
                    supabase.from('fights').select('*').order('event_date', { ascending: true }),
                    supabase.from('gear_discounts').select('*'),
                    supabase.from('sponsors').select('*'),
                    supabase.from('profiles').select('*')
                ]);
                if (gymRes.data) setGyms(sortGyms(gymRes.data));
                if (fightRes.data) setFights(fightRes.data);
                if (gearRes.data) setGear(gearRes.data);
                if (sponsorRes.data) setSponsors(sponsorRes.data);
                if (profileRes.data) setProfiles(profileRes.data);
                setLoading(false);
            };

            useEffect(() => {
                loadData();
                supabase.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => setUser(session?.user ?? null));
                return () => subscription.unsubscribe();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError("");
                if (isLogin) {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) setAuthError(error.message);
                    else { setShowPassport(true); setView('gyms'); }
                } else {
                    if (password !== confirmPassword) { setAuthError("Passwords do not match."); return; }
                    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
                    if (error) setAuthError(error.message);
                    else {
                        if (data.user) {
                            await supabase.from('profiles').insert([{ id: data.user.id, full_name: fullName || "Athlete", username: email.split('@')[0], home_gym: "Not Set" }]);
                        }
                        setAuthError("Success! Check email for activation.");
                        setIsLogin(true);
                    }
                }
            };

            const handleUpdateProfile = async () => {
                if (!user) return;
                const { error } = await supabase.from('profiles').update({ home_gym: editHomeGym, current_gym: editCurrentGym, planned_gyms: editPlannedGyms }).eq('id', user.id);
                if (error) setAuthError(error.message);
                else { loadData(); setIsEditingProfile(false); }
            };

            const toggleSponsorReveal = (id) => {
                const newSet = new Set(revealedSponsors);
                newSet.has(id) ? newSet.delete(id) : newSet.add(id);
                setRevealedSponsors(newSet);
            };

            const toggleFightReveal = (id) => {
                const newSet = new Set(revealedFights);
                newSet.has(id) ? newSet.delete(id) : newSet.add(id);
                setRevealedFights(newSet);
            };

            const myProfile = profiles.find(p => p.id === user?.id) || { full_name: "Athlete", username: "HOLDER", avatar_url: "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-02/VOLKANOVSKI_ALEXANDER_L_02-11.png" };

            useEffect(() => {
                if (user && myProfile) {
                    setEditHomeGym(myProfile.home_gym || "");
                    setEditCurrentGym(myProfile.current_gym || "");
                    setEditPlannedGyms(myProfile.planned_gyms || "");
                }
            }, [user, myProfile.id]);

            const filteredGyms = gyms.filter(g => {
                const locStr = `${g.city} ${g.location} ${g.city_country}`.toLowerCase();
                const matchesCity = activeCity === "Where" || locStr.includes(activeCity.toLowerCase());
                const matchesType = activeType === "All" || g.disciplines?.toLowerCase().includes(activeType.toLowerCase());
                return matchesCity && matchesType && g.name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredFights = fights.filter(f => {
                const locStr = `${f.city} ${f.location}`.toLowerCase();
                const matchesCity = activeCity === "Where" || locStr.includes(activeCity.toLowerCase());
                const matchesType = activeType === "All" || f.fight_type?.toLowerCase().includes(activeType.toLowerCase());
                return matchesCity && matchesType && f.event_name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredGear = gear.filter(item => item.brand_name?.toLowerCase().includes(searchQuery.toLowerCase()) || item.product_name?.toLowerCase().includes(searchQuery.toLowerCase()));
            const filteredSponsors = sponsors.filter(s => s.brand_name?.toLowerCase().includes(searchQuery.toLowerCase()) || s.focus?.toLowerCase().includes(searchQuery.toLowerCase()));

            const RegisterCTA = ({ title, text }) => (
                <div onClick={() => setView('auth')} className="bg-gray-50 border-2 border-dashed border-gray-200 p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center cursor-pointer hover:border-black transition-all group">
                    <Icon name="lock" size={32} className="text-black mb-4 group-hover:scale-110 transition-transform"/>
                    <h4 className="text-xl font-black italic uppercase text-black leading-none mb-2 tracking-tighter">{title}</h4>
                    <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest mb-6">{text}</p>
                    <button className="bg-black text-[#d7df22] px-10 py-3 rounded-full text-[10px] font-black uppercase italic">Sign Up</button>
                </div>
            );

            const AdBox = () => (
                <div className="bg-black rounded-[2.5rem] p-8 flex flex-col justify-between text-left h-full border border-[#d7df22]/30 shadow-2xl relative overflow-hidden group">
                    <div className="absolute top-[-20%] right-[-10%] w-64 h-64 bg-[#d7df22] opacity-10 rounded-full blur-3xl group-hover:opacity-20 transition-opacity"></div>
                    <div>
                        <span className="bg-[#d7df22] text-black text-[8px] font-black px-2 py-0.5 rounded uppercase tracking-widest mb-4 inline-block italic">Promoted</span>
                        <h4 className="text-xl font-black italic uppercase text-white leading-none mb-2 tracking-tighter">REST ROUND™</h4>
                        <p className="text-[#d7df22] text-[10px] font-black uppercase tracking-[0.2em] mb-6 italic leading-relaxed">High-Performance Hygiene. Engineered for Combat Athletes.</p>
                        <p className="text-gray-400 text-[11px] leading-relaxed">Stop staph and ringworm before they stop your camp. Our HOCL Skin & Gear spray is the elite standard for recovery hygiene.</p>
                    </div>
                    <a href="https://restround.co" target="_blank" className="w-full bg-[#d7df22] text-black py-3 rounded-xl font-black uppercase text-[9px] tracking-[0.2em] text-center shadow-lg transition-all active:scale-95 mt-6 group-hover:bg-white">Shop Rest Round™</a>
                </div>
            );

            const GymLink = ({ name }) => {
                const gym = gyms.find(g => g.name === name);
                return (
                    <span className={`cursor-pointer underline decoration-[#d7df22] hover:text-[#d7df22] transition-colors ${!gym ? 'opacity-50 pointer-events-none' : ''}`}
                        onClick={() => { if(gym) { setSelectedGym(gym); setView('gyms'); setViewedAthlete(null); } }}>{name}</span>
                );
            };

            const AvatarStack = ({ gymId, size = "h-8 w-8" }) => {
                const attendees = profiles.filter(p => p.current_gym_id == gymId).slice(0, 3);
                return (
                    <div className={`flex -space-x-3 overflow-hidden justify-center items-center ${size.split(' ')[0]}`}>
                        {attendees.map((p, i) => (
                            <img key={i} src={p.avatar_url} className={`inline-block ${size} rounded-full ring-2 ring-white object-cover grayscale shadow-sm`} alt="user" />
                        ))}
                        {attendees.length === 0 && <span className="text-xs text-gray-300 font-black">-</span>}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-white text-black selection-brand font-['Montserrat'] overflow-x-hidden">
                    {/* NAV */}
                    <nav className="sticky top-0 z-[100] bg-white border-b border-gray-100 h-16 flex items-center justify-between px-4 md:px-12 shadow-sm">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => {setView('gyms'); setShowPassport(false); setSelectedGym(null); setSearchQuery(""); setViewedAthlete(null);}}>
                            <div className="w-10 h-10 md:w-12 md:h-12 bg-black rounded-xl flex items-center justify-center overflow-hidden shrink-0 shadow-lg border border-white/10 group-hover:border-[#d7df22] transition-all">
                                <svg viewBox="0 0 100 100" className="w-full h-full p-1.5"><text x="50%" y="45%" textAnchor="middle" fill="#d7df22" fontFamily="Arial Black, sans-serif" fontSize="18" fontWeight="900" style={{letterSpacing: '-1.5px'}}>FIGHTER</text><text x="50%" y="82%" textAnchor="middle" fill="#d7df22" fontFamily="Arial Black, sans-serif" fontSize="36" fontWeight="900" style={{letterSpacing: '-1.5px'}}>LIST</text></svg>
                            </div>
                            <div className="text-xl md:text-2xl font-black italic uppercase tracking-tighter leading-none whitespace-nowrap">FIGHTER LIST</div>
                        </div>

                        <div className="flex gap-1 md:gap-2 bg-gray-50 p-1 rounded-full shadow-inner border border-gray-100 scale-90 sm:scale-100">
                            {['gyms', 'fights', 'gear', 'sponsors'].map(id => (
                                <button key={id} onClick={() => {setView(id); setShowPassport(false); setViewedAthlete(null);}} className={`flex items-center gap-2 px-3 sm:px-5 py-2 rounded-full text-[9px] sm:text-[10px] font-black uppercase transition-all ${view === id && !showPassport ? 'bg-black text-[#d7df22] shadow-lg' : 'text-gray-400'}`}>
                                    <Icon name={id==='gyms'?'map-pin':id==='fights'?'swords':id==='gear'?'shopping-bag':'target'} size={14} /> <span className="hidden lg:inline">{id.charAt(0).toUpperCase() + id.slice(1)}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => user ? setShowPassport(!showPassport) : setView('auth')} className={`p-2.5 rounded-full shadow-lg transition-all active:scale-90 ${showPassport || view === 'auth' ? 'bg-[#d7df22] text-black border-2 border-black/5' : 'bg-black text-[#d7df22]'}`}>
                            <Icon name="user" size={20} />
                        </button>
                    </nav>

                    {/* SEARCH & FILTERS BAR */}
                    {!showPassport && !viewedAthlete && view !== 'auth' && (
                        <div className="w-full px-4 md:px-12 py-6 flex flex-col md:flex-row gap-4 items-center animate-fade-in max-w-[1400px] mx-auto">
                            {(view === 'gyms' || view === 'fights') && (
                                <div className="flex gap-2 w-full md:w-auto">
                                    <div className="relative flex-1 md:min-w-[160px] group">
                                        <Icon name="map-pin" size={14} className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none group-hover:text-red-500 transition-colors" />
                                        <select value={activeCity} onChange={(e) => setActiveCity(e.target.value)} className="w-full bg-gray-50 border-2 border-transparent hover:border-black p-4 pl-10 pr-8 rounded-full font-black uppercase text-[10px] tracking-widest outline-none cursor-pointer transition-all shadow-inner text-center">
                                            <option>Where</option>
                                            {dynamicCities.map(city => <option key={city} value={city}>{city}</option>)}
                                        </select>
                                    </div>
                                    <div className="relative flex-1 md:min-w-[140px] group">
                                        <Icon name="swords" size={14} className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none group-hover:text-black transition-colors" />
                                        <select value={activeType} onChange={(e) => setActiveType(e.target.value)} className="w-full bg-gray-50 border-2 border-transparent hover:border-black p-4 pl-10 pr-8 rounded-full font-black uppercase text-[10px] tracking-widest outline-none cursor-pointer transition-all shadow-inner text-center">
                                            <option>All</option>
                                            <option>MMA</option><option>Muay Thai</option><option>BJJ</option><option>Boxing</option><option>Wrestling</option>
                                        </select>
                                    </div>
                                </div>
                            )}
                            <div className="relative flex-1 w-full group">
                                <Icon name="search" size={18} className="absolute left-6 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-black transition-colors" />
                                <input type="text" placeholder={`Search ${view}...`} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-gray-50 border-2 border-transparent focus:border-black focus:bg-white p-4 pl-14 rounded-[2rem] font-bold outline-none transition-all shadow-inner" />
                            </div>
                        </div>
                    )}

                    <main className="w-full px-4 md:px-12 py-4 min-h-[60vh] max-w-[1400px] mx-auto">
                        {loading ? (
                            <div className="py-20 text-gray-400 font-black uppercase tracking-[0.3em] animate-pulse italic text-center">Connecting Intelligence...</div>
                        ) : viewedAthlete ? (
                            <div className="max-w-2xl mx-auto py-6 animate-slide-up">
                                <button onClick={() => setViewedAthlete(null)} className="mb-8 flex items-center gap-2 font-black uppercase italic text-[10px] text-gray-400 hover:text-black transition-colors">
                                    <Icon name="arrow-left" size={16} /> Return to Intelligence Feed
                                </button>
                                <div className="bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-gray-100">
                                    <div className="bg-black p-12 text-center relative text-white">
                                        <img src={viewedAthlete.avatar_url} className="w-40 h-40 rounded-full border-4 border-[#d7df22] mx-auto mb-8 object-cover bg-gray-900 shadow-2xl" alt="Athlete" />
                                        <h2 className="text-4xl font-black italic uppercase text-white tracking-tighter leading-none">{viewedAthlete.full_name}</h2>
                                        <a href={`https://instagram.com/${viewedAthlete.username}`} target="_blank" className="text-[#d7df22] text-[10px] font-black uppercase tracking-[0.4em] mt-4 bg-white/10 px-6 py-2 rounded-full inline-block italic hover:bg-[#d7df22] hover:text-black transition-all">@{viewedAthlete.username || "athlete"}</a>
                                    </div>
                                    <div className="p-12 space-y-12 bg-white text-black text-left">
                                        <div className="space-y-4">
                                            <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b pb-3 text-left">
                                                <Icon name="home" className="text-[#d7df22]" size={16}/> Home Gym Base
                                            </div>
                                            <div className="bg-black p-8 rounded-[2.5rem] border-2 border-[#d7df22]/20 flex justify-between items-center shadow-2xl text-left">
