<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter List | Powered by REST ROUND™</title>
    
    <!-- WEBSITE ICON (FAVICON) - Recreating your FIGHTER LIST logo as a sharp SVG -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22black%22/><text x=%2250%%22 y=%2245%%22 text-anchor=%22middle%22 fill=%22%23d7df22%22 font-family=%22Arial Black, sans-serif%22 font-size=%2218%22 font-weight=%22900%22 style=%22letter-spacing:-1px%22>FIGHTER</text><text x=%2250%%22 y=%2282%%22 text-anchor=%22middle%22 fill=%22%23d7df22%22 font-family=%22Arial Black, sans-serif%22 font-size=%2236%22 font-weight=%22900%22 style=%22letter-spacing:-1px%22>LIST</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .selection-brand::selection { background: #d7df22; color: black; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideIn 0.3s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white text-black selection-brand">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = "https://eahymntxxgflqkogdfxs.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhaHltbnR4eGdmbHFrb2dkZnhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTYzODEsImV4cCI6MjA5MTEzMjM4MX0.Tg4VEgCcWHtcZYyrXcMILd3jsf8jFDM9twPL-yX8R_s"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const InstagramIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        );

        const WhatsAppIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        );

        const XIcon = ({ size = 14 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
        );

        const FBIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        );

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const CopyButton = ({ text, size = 10, showText = false, customStyle = "" }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = (e) => {
                e.stopPropagation();
                const textArea = document.body.appendChild(document.createElement("textarea"));
                textArea.value = text;
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={handleCopy} className={`flex items-center gap-1.5 px-2 py-1 rounded-lg transition-all active:scale-95 ${customStyle || (copied ? 'bg-green-50' : 'hover:bg-gray-100')}`}>
                    {showText && <span className={`text-[8px] font-black uppercase ${copied ? 'text-green-600' : 'text-gray-400'}`}>{copied ? 'Copied!' : 'Copy'}</span>}
                    <Icon name={copied ? "check" : "copy"} size={size} className={copied ? "text-green-500" : "text-gray-400"} />
                </button>
            );
        };

        const MetricBar = ({ label, value, icon, color = "bg-black" }) => (
            <div className="space-y-1.5 text-left">
                <div className="flex justify-between items-center font-black uppercase tracking-widest text-gray-500 text-[10px]">
                    <div className="flex items-center gap-1.5"><Icon name={icon} size={12} className={icon === 'heart' ? 'text-red-500 fill-red-500' : ''}/>{label}</div>
                    <span className="text-black font-black">{value || 0}%</span>
                </div>
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${value || 0}%` }} />
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState("gyms"); 
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCity, setActiveCity] = useState("Where");
            const [activeType, setActiveType] = useState("All");
            const [selectedGym, setSelectedGym] = useState(null);
            const [showPassport, setShowPassport] = useState(false);
            const [revealedSponsors, setRevealedSponsors] = useState(new Set());
            const [revealedFights, setRevealedFights] = useState(new Set());
            const [shareMenuFightId, setShareMenuFightId] = useState(null);

            const [gyms, setGyms] = useState([]);
            const [fights, setFights] = useState([]);
            const [gear, setGear] = useState([]);
            const [sponsors, setSponsors] = useState([]);
            const [profiles, setProfiles] = useState([]);
            
            // Auth States
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [confirmPassword, setConfirmPassword] = useState("");
            const [fullName, setFullName] = useState("");
            const [authError, setAuthError] = useState("");
            const [isLogin, setIsLogin] = useState(true);

            // Profile Edit States
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [editHomeGym, setEditHomeGym] = useState("");
            const [editPlannedGyms, setEditPlannedGyms] = useState("");

            const sortGyms = (data) => {
                return [...data].sort((a, b) => {
                    const aName = a.name?.toLowerCase() || "";
                    const bName = b.name?.toLowerCase() || "";
                    const isABangtao = aName.includes("bangtao");
                    const isBBangtao = bName.includes("bangtao");
                    if (isABangtao && !isBBangtao) return -1;
                    if (!isABangtao && isBBangtao) return 1;
                    return (b.upvotes || 0) - (a.upvotes || 0) || aName.localeCompare(bName);
                });
            };

            const loadData = async () => {
                setLoading(true);
                const [gymRes, fightRes, gearRes, sponsorRes, profileRes] = await Promise.all([
                    supabase.from('gyms').select('*'),
                    supabase.from('fights').select('*').order('event_date', { ascending: true }),
                    supabase.from('gear_discounts').select('*'),
                    supabase.from('sponsors').select('*'),
                    supabase.from('profiles').select('*')
                ]);
                if (gymRes.data) setGyms(sortGyms(gymRes.data));
                if (fightRes.data) setFights(fightRes.data);
                if (gearRes.data) setGear(gearRes.data);
                if (sponsorRes.data) setSponsors(sponsorRes.data);
                if (profileRes.data) setProfiles(profileRes.data);
                setLoading(false);
            };

            useEffect(() => {
                loadData();
                supabase.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => setUser(session?.user ?? null));
                return () => subscription.unsubscribe();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError("");
                if (isLogin) {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) setAuthError(error.message);
                    else { setShowPassport(true); setView('gyms'); }
                } else {
                    if (password !== confirmPassword) {
                        setAuthError("Passwords do not match.");
                        return;
                    }
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: { data: { full_name: fullName } }
                    });
                    if (error) setAuthError(error.message);
                    else {
                        if (data.user) {
                            await supabase.from('profiles').insert([{ 
                                id: data.user.id, 
                                full_name: fullName || "Athlete", 
                                username: email.split('@')[0],
                                home_gym: "Not Set",
                                planned_gyms: "None Recorded"
                            }]);
                        }
                        setAuthError("Success! Check email for activation.");
                        setIsLogin(true);
                    }
                }
            };

            const handleUpdateProfile = async () => {
                if (!user) return;
                const { error } = await supabase.from('profiles').update({
                    home_gym: editHomeGym,
                    planned_gyms: editPlannedGyms
                }).eq('id', user.id);
                if (error) setAuthError(error.message);
                else { loadData(); setIsEditingProfile(false); }
            };

            const handleLike = async (gymId, currentLikes) => {
                const newCount = (currentLikes || 0) + 1;
                const updatedGyms = gyms.map(g => g.id === gymId ? { ...g, upvotes: newCount } : g);
                setGyms(sortGyms(updatedGyms));
                if (selectedGym && selectedGym.id === gymId) setSelectedGym({...selectedGym, upvotes: newCount});
                await supabase.from('gyms').update({ upvotes: newCount }).eq('id', gymId);
            };

            const toggleSponsorReveal = (id) => {
                const newSet = new Set(revealedSponsors);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setRevealedSponsors(newSet);
            };

            const toggleFightReveal = (id) => {
                const newSet = new Set(revealedFights);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setRevealedFights(newSet);
            };

            const toggleShareMenu = (id) => {
                setShareMenuFightId(shareMenuFightId === id ? null : id);
            };

            const AvatarStack = ({ gymId }) => {
                const attendees = profiles.filter(p => p.current_gym_id == gymId).slice(0, 3);
                return (
                    <div className="flex -space-x-1.5 overflow-hidden justify-center items-center h-4">
                        {attendees.map((p, i) => (
                            <img key={i} src={p.avatar_url} className="inline-block h-3.5 w-3.5 rounded-full ring-1 ring-white object-cover grayscale" alt="user" />
                        ))}
                        {attendees.length === 0 && <span className="text-[10px] text-gray-200 font-black">-</span>}
                    </div>
                );
            };

            const profile = profiles.find(p => p.id === user?.id) || {
                full_name: "Athlete",
                username: "HOLDER",
                avatar_url: "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-02/VOLKANOVSKI_ALEXANDER_L_02-11.png",
                home_gym: "Not Set",
                planned_gyms: "None Recorded"
            };

            useEffect(() => {
                if (user && profile) {
                    setEditHomeGym(profile.home_gym || "");
                    setEditPlannedGyms(profile.planned_gyms || "");
                }
            }, [user, profile.id]);

            const filteredGyms = gyms.filter(g => {
                const matchesCity = activeCity === "Where" || g.city === activeCity || g.location?.includes(activeCity);
                const matchesType = activeType === "All" || g.disciplines?.includes(activeType);
                return matchesCity && matchesType && g.name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredFights = fights.filter(f => {
                const matchesCity = activeCity === "Where" || f.city === activeCity;
                const matchesType = activeType === "All" || f.fight_type?.includes(activeType);
                return matchesCity && matchesType && f.event_name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredGear = gear.filter(item => 
                item.brand_name?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                item.product_name?.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const filteredSponsors = sponsors.filter(s => 
                s.brand_name?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                s.focus?.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const isPublicView = ['gyms', 'fights', 'gear', 'sponsors'].includes(view);

            const handleShare = (platform, fight) => {
                const url = window.location.href;
                const text = `Check out ${fight.event_name} in ${fight.city} on Fighter List!`;
                if(platform === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
                if(platform === 'wa') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text + " " + url)}`, '_blank');
                if(platform === 'ig') window.open(`https://instagram.com`, '_blank');
            };

            const RegisterCTA = ({ title, text, fullWidth = false }) => (
                <div onClick={() => setView('auth')} className={`${fullWidth ? 'col-span-full mt-4' : 'h-full'} bg-gray-50 border-2 border-dashed border-gray-200 p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center cursor-pointer hover:border-black transition-all group animate-fade-in`}>
                    <Icon name="lock" size={32} className="text-black mb-4 group-hover:scale-110 transition-transform"/>
                    <h4 className="text-xl font-black italic uppercase text-black leading-none mb-2 tracking-tighter">{title}</h4>
                    <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest mb-6">{text}</p>
                    <button className="bg-black text-[#d7df22] px-10 py-3 rounded-full text-[10px] font-black uppercase italic shadow-lg">Sign Up</button>
                </div>
            );

            const AdBox = () => (
                <div className="bg-black rounded-[2.5rem] p-8 flex flex-col justify-between text-left h-full border border-[#d7df22]/30 shadow-2xl relative overflow-hidden group">
                    <div className="absolute top-[-20%] right-[-10%] w-64 h-64 bg-[#d7df22] opacity-10 rounded-full blur-3xl group-hover:opacity-20 transition-opacity"></div>
                    <div>
                        <span className="bg-[#d7df22] text-black text-[8px] font-black px-2 py-0.5 rounded uppercase tracking-widest mb-4 inline-block">Promoted</span>
                        <h4 className="text-xl font-black italic uppercase text-white leading-none mb-2 tracking-tighter">REST ROUND™</h4>
                        <p className="text-[#d7df22] text-[10px] font-black uppercase tracking-[0.2em] mb-6 italic leading-relaxed">High-Performance Hygiene. Engineered for Combat Athletes.</p>
                        <div className="space-y-4">
                            <p className="text-gray-400 text-[11px] leading-relaxed">Stop staph and ringworm before they stop your camp. Our HOCL Skin & Gear spray is the elite standard for recovery hygiene.</p>
                        </div>
                    </div>
                    <a href="https://restround.co" target="_blank" className="w-full bg-[#d7df22] text-black py-3 rounded-xl font-black uppercase text-[9px] tracking-[0.2em] text-center shadow-lg transition-all active:scale-95 mt-6 group-hover:bg-white">Shop Rest Round™</a>
                </div>
            );

            return (
                <div className="min-h-screen bg-white text-black selection-brand font-['Montserrat']">
                    {/* NAV */}
                    <nav className="sticky top-0 z-[100] bg-white border-b border-gray-100 h-16 flex items-center justify-between px-4 md:px-12">
                        <div className="text-xl md:text-2xl font-black italic uppercase tracking-tighter cursor-pointer hover:text-[#d7df22] transition-colors" onClick={() => {setView('gyms'); setShowPassport(false);}}>
                            FIGHTER LIST
                        </div>
                        <div className="flex gap-1 md:gap-2 bg-gray-50 p-1 rounded-full shadow-inner">
                            {['gyms', 'fights', 'gear', 'sponsors'].map(id => (
                                <button key={id} onClick={() => {setView(id); setShowPassport(false);}} className={`flex items-center gap-2 px-4 md:px-5 py-2 rounded-full text-[9px] md:text-[10px] font-black uppercase transition-all ${view === id && !showPassport ? 'bg-black text-[#d7df22] shadow-lg' : 'text-gray-400'}`}>
                                    <Icon name={id==='gyms'?'map-pin':id==='fights'?'swords':id==='gear'?'shopping-bag':'target'} size={14} /> <span className="hidden sm:inline">{id.charAt(0).toUpperCase() + id.slice(1)}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => user ? setShowPassport(!showPassport) : setView('auth')} className={`p-2.5 rounded-full shadow-lg transition-all active:scale-90 ${showPassport || view === 'auth' ? 'bg-[#d7df22] text-black border-2 border-black/5' : 'bg-black text-[#d7df22]'}`}>
                            <Icon name="user" size={20} />
                        </button>
                    </nav>

                    {/* FILTER STRIP */}
                    {isPublicView && !showPassport && (
                        <div className="bg-white border-b border-gray-100 py-4 sticky top-16 z-40 px-4 md:px-12 space-y-4 shadow-sm text-left">
                            <div className="w-full space-y-4">
                                {(view === 'gyms' || view === 'fights') && (
                                    <div className="flex items-center gap-3 overflow-x-auto no-scrollbar text-black">
                                        <Icon name="globe" size={16} className="text-[#d7df22] shrink-0"/>
                                        {["Where", "Phuket", "Patong", "Perth", "Bangkok", "Austin", "LA"].map(city => (
                                            <button key={city} onClick={() => setActiveCity(city)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${activeCity === city ? 'bg-black text-[#d7df22] border-black shadow-lg' : 'text-gray-400 border-gray-100 bg-white'}`}>{city}</button>
                                        ))}
                                    </div>
                                )}
                                <div className="flex flex-col md:flex-row md:items-center gap-3 text-black">
                                    {(view === 'gyms' || view === 'fights') && (
                                        <div className="flex gap-2 items-center overflow-x-auto no-scrollbar shrink-0">
                                            <Icon name="layout-grid" size={16} className="text-gray-300 shrink-0"/>
                                            {["All", "MMA", "Muay Thai", "BJJ", "Flyweight", "Bantamweight", "Featherweight"].map(type => (
                                                <button key={type} onClick={() => setActiveType(type)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${activeType === type ? 'bg-[#d7df22] text-black border-black shadow-lg' : 'text-gray-400 border-gray-100 bg-white'}`}>{type}</button>
                                            ))}
                                        </div>
                                    )}
                                    <div className="relative flex-1 min-w-[200px]">
                                        <Icon name="search" size={12} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300" />
                                        <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder={`Search ${view}...`} className="bg-gray-50 border border-gray-100 py-2.5 pl-9 pr-4 rounded-xl text-[10px] font-bold outline-none focus:border-black w-full" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="w-full px-4 md:px-12 py-8 min-h-[60vh]">
                        {loading ? (
                            <div className="py-20 text-gray-400 font-black uppercase tracking-[0.3em] animate-pulse italic text-center">Connecting Intelligence...</div>
                        ) : (
                          <div className="animate-fade-in text-center">
                            
                            {/* AUTH VIEW */}
                            {view === 'auth' && !user && (
                                <div className="max-w-md mx-auto py-10 text-left">
                                    <div className="bg-white rounded-[3rem] shadow-2xl border border-gray-100 p-10">
                                        <h2 className="text-3xl font-black italic uppercase mb-2 tracking-tighter leading-none">
                                            {isLogin ? "Athlete Login" : "Sign Up"}
                                        </h2>
                                        <p className="text-[9px] font-black uppercase text-gray-400 tracking-widest mb-8">Join the elite combat directory</p>
                                        <form onSubmit={handleAuth} className="space-y-4">
                                            {!isLogin && (
                                                <div>
                                                    <p className="text-[8px] font-black text-gray-400 uppercase mb-1 ml-2 tracking-widest">Full Name</p>
                                                    <input type="text" placeholder="Alex Volkanovski" value={fullName} onChange={(e) => setFullName(e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-black" required />
                                                </div>
                                            )}
                                            <div>
                                                <p className="text-[8px] font-black text-gray-400 uppercase mb-1 ml-2 tracking-widest">Email</p>
                                                <input type="email" placeholder="athlete@fighterlist.com" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-black" required />
                                            </div>
                                            <div>
                                                <p className="text-[8px] font-black text-gray-400 uppercase mb-1 ml-2 tracking-widest">Password</p>
                                                <input type="password" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-black" required />
                                            </div>
                                            {!isLogin && (
                                                <div>
                                                    <p className="text-[8px] font-black text-gray-400 uppercase mb-1 ml-2 tracking-widest">Confirm Password</p>
                                                    <input type="password" placeholder="••••••••" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-black" required />
                                                </div>
                                            )}
                                            {authError && <p className="text-[10px] font-black uppercase tracking-tight text-red-500">{authError}</p>}
                                            <button type="submit" className="w-full bg-black text-[#d7df22] py-5 rounded-[1.5rem] font-black uppercase italic tracking-widest shadow-xl active:scale-95 transition-all">
                                                {isLogin ? "Enter Dashboard" : "Sign Up"}
                                            </button>
                                            <p className="text-center text-[9px] font-black uppercase text-gray-400 cursor-pointer pt-2" onClick={() => { setIsLogin(!isLogin); setAuthError(""); }}>
                                                {isLogin ? "New athlete? Register here" : "Already registered? Login"}
                                            </p>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* PASSPORT VIEW */}
                            {showPassport && user && (
                                <div className="max-w-2xl mx-auto py-10 text-left animate-slide-up">
                                    <div className="bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-gray-100">
                                        <div className="bg-black p-12 text-center relative">
                                            <button onClick={() => {supabase.auth.signOut(); setShowPassport(false);}} className="absolute top-6 right-6 text-[#d7df22] hover:text-white transition-colors"><Icon name="log-out" size={18} /></button>
                                            <img src={profile.avatar_url} className="w-32 h-32 rounded-full border-4 border-[#d7df22] mx-auto mb-6 object-cover bg-gray-900 shadow-2xl" alt="Athlete" />
                                            <h2 className="text-3xl font-black italic uppercase text-white tracking-tighter leading-none">{profile.full_name}</h2>
                                            <p className="text-[#d7df22] text-[10px] font-black uppercase tracking-[0.4em] mt-3 bg-white/10 px-6 py-2 rounded-full inline-block italic">@{profile.username}</p>
                                        </div>
                                        <div className="p-12 space-y-12 bg-white text-black">
                                            <div className="space-y-4">
                                                <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b pb-3"><Icon name="home" className="text-[#d7df22]" size={16}/> Home Gym Base</div>
                                                {isEditingProfile ? (
                                                    <input type="text" value={editHomeGym} onChange={(e) => setEditHomeGym(e.target.value)} placeholder="Home Gym" className="w-full bg-gray-50 p-6 rounded-[2rem] border-2 border-black outline-none font-black uppercase italic text-xl" />
                                                ) : (
                                                    <div className="bg-black p-8 rounded-[2.5rem] border-2 border-[#d7df22]/20 flex justify-between items-center shadow-2xl">
                                                        <div className="text-white"><p className="text-[9px] font-black text-[#d7df22] uppercase mb-1 italic">Current Base</p><h4 className="text-2xl font-black uppercase italic leading-none">{profile.home_gym || "Not Set"}</h4></div>
                                                        <Icon name="chevron-right" className="bg-[#d7df22] text-black rounded-full p-2" size={24} />
                                                    </div>
                                                )}
                                            </div>
                                            <div className="space-y-6">
                                                <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b border-gray-50 pb-3"><Icon name="globe" className="text-[#d7df22]" size={16}/> Athlete Passport Intelligence</div>
                                                <div className="space-y-4">
                                                    <div className="flex justify-between items-center py-2 border-b border-gray-50">
                                                        <span className="text-[11px] font-bold uppercase text-gray-400 tracking-widest">Plan to Visit</span>
                                                        {isEditingProfile ? (
                                                            <input type="text" value={editPlannedGyms} onChange={(e) => setEditPlannedGyms(e.target.value)} placeholder="Gym names" className="bg-gray-50 p-2 rounded-xl border border-black outline-none font-black uppercase italic text-xs text-right" />
                                                        ) : (
                                                            <span className="font-black uppercase italic text-sm text-[#d7df22] text-right">{profile.planned_gyms || "None Recorded"}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex gap-4">
                                                {isEditingProfile ? (
                                                    <button onClick={handleUpdateProfile} className="flex-1 bg-black text-[#d7df22] py-6 rounded-[1.5rem] font-black uppercase italic text-xs tracking-widest flex items-center justify-center gap-3 shadow-2xl">Save Passport</button>
                                                ) : (
                                                    <button onClick={() => setIsEditingProfile(true)} className="w-full bg-black text-white py-6 rounded-[1.5rem] font-black uppercase italic text-xs tracking-widest flex items-center justify-center gap-3 shadow-2xl active:scale-95 transition-all"><Icon name="settings" size={18}/> Manage Athlete Passport</button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* GYMS VIEW */}
                            {view === 'gyms' && !showPassport && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-left w-full">
                                    {filteredGyms.map((gym, idx) => {
                                        const elements = [];
                                        if (idx === 3) {
                                            elements.push(<AdBox key="ad-box" />);
                                        }
                                        elements.push(
                                            <div key={gym.id} className="bg-white rounded-[2.5rem] border border-gray-100 overflow-hidden shadow-xl cursor-pointer hover:shadow-2xl transition-all group flex flex-col h-full" onClick={() => setSelectedGym(gym)}>
                                                <div className="relative h-48 overflow-hidden bg-gray-50 shrink-0">
                                                    <img src={gym.image_url || "https://images.unsplash.com/photo-1595079676339-1534801ad6cf?auto=format&fit=crop&q=80&w=800"} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="gym" />
                                                    <div className="absolute top-4 left-4 flex gap-1">
                                                        {gym.name?.toLowerCase().includes("bangtao") && <span className="bg-[#d7df22] text-black text-[8px] font-black px-2 py-0.5 rounded uppercase tracking-widest shadow-lg">Featured</span>}
                                                    </div>
                                                </div>
                                                <div className="p-6 flex flex-col flex-1">
                                                    <div className="flex items-center gap-1 text-gray-400 font-bold uppercase text-[8px] tracking-widest mb-1 truncate"><Icon name="map-pin" size={10} className="text-red-500" /> {gym.location || gym.city}</div>
                                                    <h3 className="text-sm font-black italic uppercase leading-tight mb-4 truncate">{gym.name}</h3>
                                                    
                                                    {/* SOCIAL STATUS BOX */}
                                                    <div className="grid grid-cols-3 gap-1 py-3 border-y border-gray-50 mb-4 text-center">
                                                        <div className="border-r border-gray-50 space-y-1">
                                                            <p className="text-[6px] font-black text-gray-400 uppercase tracking-tighter leading-none">Here Now</p>
                                                            <AvatarStack gymId={gym.id} />
                                                        </div>
                                                        <div className="border-r border-gray-50 space-y-1">
                                                            <p className="text-[6px] font-black text-gray-400 uppercase tracking-tighter leading-none">Was Here</p>
                                                            <span className="text-[10px] font-black leading-none block">-</span>
                                                        </div>
                                                        <div className="space-y-1">
                                                            <p className="text-[6px] font-black text-gray-400 uppercase tracking-tighter leading-none">Visit Soon</p>
                                                            <span className="text-[10px] font-black leading-none block">-</span>
                                                        </div>
                                                    </div>

                                                    <button className="w-full bg-black text-[#d7df22] py-2 rounded-xl font-black uppercase text-[8px] tracking-[0.2em] shadow-md mt-auto">Details</button>
                                                </div>
                                            </div>
                                        );
                                        return elements;
                                    })}
                                    {filteredGyms.length < 4 && <AdBox key="ad-box-fallback" />}
                                </div>
                            )}

                            {/* GEAR VIEW */}
                            {view === 'gear' && (
                                <div className="space-y-10 text-left text-black">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter text-black leading-none">GEAR DISCOUNTS</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 items-stretch w-full">
                                        {(user ? filteredGear : filteredGear.slice(0, 5)).map((item, i) => (
                                            <div key={i} className="bg-white border-2 border-gray-100 p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between hover:border-black transition-all text-black h-full">
                                                <div>
                                                    <span className="bg-[#d7df22] text-black px-4 py-1 rounded-full text-[10px] font-black uppercase mb-6 inline-block border border-black/5 shadow-sm">{item.discount_amount}</span>
                                                    <p className="text-[9px] font-black text-gray-400 uppercase mb-1 tracking-widest">{item.brand_name}</p>
                                                    <h4 className="text-lg font-black italic uppercase mb-6 leading-tight">{item.product_name}</h4>
                                                    <div className="bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-100 flex justify-between items-center mb-6 font-mono font-black text-lg text-black">
                                                        <span>{item.discount_code}</span>
                                                        <CopyButton text={item.discount_code} showText={true} />
                                                    </div>
                                                </div>
                                                <button onClick={() => window.open(item.affiliate_url)} className="w-full bg-black text-[#d7df22] py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg mt-auto">Get Deal</button>
                                            </div>
                                        ))}
                                        {!user && filteredGear.length >= 5 && (
                                            <div className="h-full"><RegisterCTA title="Unlock More Gear" text="See 20+ hidden combat gear discounts" /></div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* SPONSORS VIEW */}
                            {view === 'sponsors' && (
                                <div className="space-y-10 text-left text-black">
                                    <div className="bg-[#d7df22] p-12 rounded-[3rem] text-black shadow-2xl relative overflow-hidden">
                                        <div className="absolute right-[-5%] top-[-10%] opacity-10 rotate-12"><Icon name="target" size={200} /></div>
                                        <h2 className="text-4xl md:text-5xl font-black italic uppercase mb-4 tracking-tighter leading-none">Sponsors guide</h2>
                                        <p className="max-w-xl font-bold text-sm leading-loose uppercase tracking-widest opacity-80 text-black">Sponsorship is a partnership. Connect with brands dedicated to combat athletes.</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-stretch w-full">
                                        {(user ? filteredSponsors : filteredSponsors.slice(0, 5)).map(s => (
                                            <div key={s.id} className="bg-white border-2 border-gray-100 p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between hover:border-black transition-all">
                                                <div>
                                                    <h3 className="text-xl font-black italic uppercase mb-1 leading-none">{s.brand_name}</h3>
                                                    <p className="text-[#d7df22] font-black uppercase text-[8px] tracking-[0.2em] bg-black inline-block px-2 py-0.5 rounded mb-8 italic">{s.focus}</p>
                                                    <div className="space-y-4 mb-8">
                                                        <div className="bg-gray-50 p-4 rounded-2xl"><p className="text-[8px] font-black text-gray-400 uppercase mb-1 tracking-widest">Requirement</p><p className="text-[10px] font-bold leading-tight">{s.requirements}</p></div>
                                                    </div>
                                                </div>
                                                <div className="mt-auto">
                                                    {!revealedSponsors.has(s.id) ? (
                                                        <button onClick={() => toggleSponsorReveal(s.id)} className="w-full py-4 rounded-2xl font-black uppercase italic tracking-widest text-[10px] bg-black text-white hover:bg-[#d7df22] hover:text-black transition-all flex items-center justify-center gap-2 shadow-xl">Contact</button>
                                                    ) : (
                                                        <div className="flex items-center gap-2 bg-black text-white p-2 rounded-2xl animate-fade-in shadow-lg">
                                                            <span className="text-[10px] font-black italic px-2 flex-1 truncate">{s.email || 'team.restround@gmail.com'}</span>
                                                            <CopyButton text={s.email || 'team.restround@gmail.com'} size={11} showText={true} customStyle="bg-white/10 hover:bg-white/20 px-2 py-1 rounded-lg" />
                                                            <button onClick={() => toggleSponsorReveal(s.id)} className="text-white/40 hover:text-red-500 px-1"><Icon name="x" size={12} /></button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                        {!user && filteredSponsors.length >= 5 && (
                                            <div className="h-full"><RegisterCTA title="Unlock More Sponsors" text="Connect with brands looking for talent" /></div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* FIGHTS VIEW */}
                            {view === 'fights' && (
                                <div className="max-w-5xl mx-auto space-y-4 text-left text-black">
                                    <h2 className="text-4xl font-black italic uppercase mb-10 tracking-tighter leading-none">Community Updates</h2>
                                    <div className="grid grid-cols-1 gap-3">
                                        {(user ? filteredFights : filteredFights.slice(0, 5)).map(f => (
                                            <div key={f.id} className="bg-white border-2 border-black p-4 rounded-2xl flex flex-col shadow-md relative group animate-fade-in text-black">
                                                <div className="flex items-center justify-between gap-4">
                                                    <div className="flex items-center gap-4 flex-1 text-black">
                                                        <div className="bg-gray-50 p-2 rounded-xl text-center min-w-[65px] border border-gray-100 shadow-inner shrink-0 text-black">
                                                            <p className="text-lg font-black italic tracking-tighter">{f.event_date?.split(' ')[1] || "TBD"}</p>
                                                        </div>
                                                        <div className="text-left space-y-0.5 overflow-hidden pr-2">
                                                            <span className="bg-[#d7df22] text-black px-2 py-0.2 rounded-full text-[7px] font-black uppercase tracking-widest">{f.fight_type}</span>
                                                            <h3 className="text-sm md:text-base font-black italic uppercase leading-tight tracking-tighter truncate text-black">{f.event_name}</h3>
                                                            <p className="text-gray-400 font-bold uppercase text-[8px] flex items-center gap-1 tracking-widest italic leading-none"><Icon name="map-pin" size={10} className="text-red-500" /> {f.city}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3 shrink-0 relative">
                                                        {!revealedFights.has(f.id) ? (
                                                            <button onClick={() => toggleFightReveal(f.id)} className="px-6 py-2 bg-black text-white rounded-xl font-black uppercase text-[9px] tracking-widest hover:bg-[#d7df22] hover:text-black shadow-sm">Contact</button>
                                                        ) : (
                                                            <div className="flex items-center gap-2 bg-black text-white p-1 rounded-xl animate-fade-in shadow-xl">
                                                                <span className="text-[9px] font-black italic px-2 max-w-[140px] truncate">{f.contact_info}</span>
                                                                <CopyButton text={f.contact_info} size={11} showText={true} customStyle="bg-white/10 hover:bg-white/20 px-2 py-1 rounded-lg" />
                                                                <button onClick={() => toggleFightReveal(f.id)} className="text-white/40 hover:text-red-500 transition-colors px-1"><Icon name="x" size={12} /></button>
                                                            </div>
                                                        )}
                                                        <button onClick={() => toggleShareMenu(f.id)} className={`p-2 rounded-full transition-all border border-gray-100 shadow-sm ${shareMenuFightId === f.id ? 'bg-[#d7df22] text-black' : 'bg-gray-50 text-gray-400 hover:text-black'}`}><Icon name="share-2" size={12} /></button>
                                                    </div>
                                                </div>
                                                {shareMenuFightId === f.id && (
                                                    <div className="mt-3 pt-3 border-t border-gray-50 flex items-center justify-between bg-gray-50 p-2 rounded-xl animate-fade-in">
                                                        <div className="flex items-center gap-4 px-2">
                                                            <button onClick={() => handleShare('ig', f)} className="hover:text-pink-600 transition-colors"><InstagramIcon size={16} /></button>
                                                            <button onClick={() => handleShare('fb', f)} className="hover:text-blue-600 transition-colors"><FBIcon size={16} /></button>
                                                            <button onClick={() => handleShare('wa', f)} className="hover:text-green-600 transition-colors"><WhatsAppIcon size={16} /></button>
                                                        </div>
                                                        <button onClick={() => setShareMenuFightId(null)} className="ml-auto text-gray-300 hover:text-red-500 transition-colors px-2 text-black"><Icon name="x" size={14}/></button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        {!user && filteredFights.length >= 5 && <RegisterCTA fullWidth title="Unlock More Fights" text="Gain access to the full matchmaking intelligence feed" />}
                                    </div>
                                    {filteredFights.length === 0 && <div className="py-20 text-center text-gray-400 font-black uppercase tracking-widest italic">No fights match your search</div>}
                                </div>
                            )}
                          </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-white py-12 border-t border-gray-100 text-black">
                        <div className="w-full px-4 md:px-12 flex flex-wrap items-center justify-center gap-x-8 gap-y-4 text-[10px] font-black uppercase tracking-[0.2em] italic whitespace-nowrap">
                            <div className="flex items-center gap-4 text-black">
                                <a href="https://instagram.com/fighterlist_com" target="_blank" className="hover:scale-110 transition-transform active:scale-90"><InstagramIcon size={16}/></a>
                                <a href="https://wa.me/66924692066" target="_blank" className="hover:scale-110 transition-transform active:scale-90"><WhatsAppIcon size={16}/></a>
                                <a href="https://x.com" target="_blank" className="hover:scale-110 transition-transform active:scale-90"><XIcon size={14}/></a>
                            </div>
                            <span className="text-gray-300 hidden md:inline">/</span>
                            <a href="mailto:TEAM.RESTROUND@GMAIL.COM" className="hover:text-[#d7df22] transition-colors font-black uppercase tracking-tight">TEAM.RESTROUND@GMAIL.COM</a>
                            <span className="text-gray-300 hidden md:inline">/</span>
                            <div className="flex items-center gap-2 font-black uppercase">
                                <span>FIGHTER LIST © 2026</span>
                                <span className="opacity-30 font-normal ml-1 mr-1">•</span>
                                <span>POWERED BY REST ROUND™</span>
                            </div>
                        </div>
                    </footer>

                    {/* GYM DETAIL MODAL */}
                    {selectedGym && (
                        <div className="fixed inset-0 z-[400] flex items-end md:items-center justify-center p-0 md:p-8 text-black text-left">
                            <div className="absolute inset-0 bg-black/85 backdrop-blur-md animate-fade-in" onClick={() => setSelectedGym(null)} />
                            <div className="relative bg-white w-full max-w-5xl h-[92vh] md:h-full md:max-h-[90vh] rounded-t-[3rem] md:rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row animate-slide-up">
                                <button onClick={() => setSelectedGym(null)} className="absolute top-4 right-4 bg-black text-[#d7df22] p-2 rounded-full hover:scale-110 transition-transform z-[500] shadow-2xl"><Icon name="x" size={20} /></button>
                                <div className="md:w-2/5 relative h-64 md:h-auto shrink-0 bg-gray-100 border-b md:border-b-0 md:border-r border-gray-100 overflow-hidden">
                                    <img src={selectedGym.image_url || "https://images.unsplash.com/photo-1595079676339-1534801ad6cf?auto=format&fit=crop&q=80&w=800"} className="w-full h-full object-cover" alt="gym" />
                                    <div className="absolute bottom-6 left-6 flex items-center bg-white/90 backdrop-blur px-5 py-3 rounded-2xl shadow-xl border border-black/5">
                                        <Icon name="heart" size={20} className="text-red-500 mr-2 fill-red-500" />
                                        <span className="text-xl font-black italic">{selectedGym.upvotes || 0}</span>
                                    </div>
                                </div>
                                <div className="md:w-3/5 p-8 md:p-12 overflow-y-auto no-scrollbar space-y-10 text-black">
                                    <div className="space-y-3">
                                        <div className="flex items-center gap-4">
                                            <h2 className="text-xl md:text-2xl font-black italic uppercase tracking-tighter leading-none text-black">{selectedGym.name}</h2>
                                            <button onClick={() => handleLike(selectedGym.id, selectedGym.upvotes)} className="hover:scale-110 transition-transform active:scale-90 flex items-center gap-1.5"><Icon name="heart" size={18} className="text-red-500 fill-red-500" /><span className="text-[10px] font-black text-gray-400">{selectedGym.upvotes || 0}</span></button>
                                        </div>
                                        <div className="flex items-center gap-2 text-gray-400 font-bold uppercase text-[11px] tracking-widest text-left"><Icon name="map-pin" size={14} className="text-red-500"/> {selectedGym.location || selectedGym.city}</div>
                                    </div>
                                    <div className="bg-[#d7df22]/5 border-2 border-[#d7df22]/20 p-8 rounded-[2.5rem] space-y-8 shadow-inner text-black">
                                        <div className="flex items-center gap-3 text-black font-black text-[10px] uppercase tracking-widest"><Icon name="users" size={20} /> Athlete Directory</div>
                                        <div className="grid grid-cols-1 gap-10">
                                            <div className="space-y-4">
                                                <h5 className="text-[8px] font-black uppercase text-gray-400 tracking-widest border-b pb-2 italic">Training Here Now</h5>
                                                <div className="flex flex-wrap gap-4">
                                                    {profiles.filter(p => p.current_gym_id == selectedGym.id).map((p, i) => (
                                                        <img key={i} src={p.avatar_url} className="h-16 w-16 rounded-full border-4 border-white shadow-xl object-cover grayscale hover:grayscale-0 transition-all duration-500" alt="p" />
                                                    ))}
                                                    {profiles.filter(p => p.current_gym_id == selectedGym.id).length === 0 && <span className="text-[10px] text-gray-300 font-black uppercase tracking-widest">No public profiles listed.</span>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-6 text-black">
                                        <h4 className="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 border-b border-gray-100 pb-2 flex items-center gap-2 italic"><Icon name="trophy" size={14}/> Intelligence intelligence</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-6 text-left">
                                            <MetricBar label="Hygiene Score" value={selectedGym.hygiene_score} icon="shield-check" />
                                            <MetricBar label="Community Score" value={selectedGym.community_score} icon="target" />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <a href={selectedGym.website} target="_blank" className="w-full bg-black text-[#d7df22] py-3 rounded-xl font-black uppercase italic tracking-[0.2em] text-[10px] text-center shadow-lg active:scale-95 transition-all flex items-center justify-center uppercase">Visit Website</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
