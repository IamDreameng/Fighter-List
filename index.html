<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter List | Powered by REST ROUND™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .selection-brand::selection { background: #d7df22; color: black; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideIn 0.3s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white text-black selection-brand">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SUPABASE CONFIG ---
        // PASTE YOUR ACTUAL KEYS HERE TO GO LIVE
        const SUPABASE_URL = ""; 
        const SUPABASE_ANON_KEY = ""; 

        const supabaseFetch = async (endpoint, options = {}) => {
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return { data: null, error: 'No Keys' };
            const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
            const response = await fetch(url, {
                ...options,
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation',
                    ...options.headers,
                },
            });
            if (!response.ok) return { data: null, error: await response.text() };
            return { data: await response.json(), error: null };
        };

        // --- COMPONENTS ---

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const MetricBar = ({ label, value, icon, color = "bg-black" }) => (
            <div className="space-y-1.5">
                <div className="flex justify-between items-center font-black uppercase tracking-widest text-gray-500 text-[10px]">
                    <div className="flex items-center gap-1.5"><Icon name={icon} size={12} className={icon === 'heart' ? 'text-red-500 fill-red-500' : ''}/>{label}</div>
                    <span className="text-black">{value}%</span>
                </div>
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${value}%` }} />
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState("gyms");
            const [activeCity, setActiveCity] = useState("Where");
            const [activeType, setActiveType] = useState("All");
            const [selectedGym, setSelectedGym] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            
            const [gyms, setGyms] = useState([]);
            const [fights, setFights] = useState([]);
            const [gear, setGear] = useState([]);
            const [sponsors, setSponsors] = useState([]);
            const [profiles, setProfiles] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    setLoading(true);
                    const [gymRes, fightRes, gearRes, sponsorRes, profileRes] = await Promise.all([
                        supabaseFetch('gyms?select=*&order=upvotes.desc'),
                        supabaseFetch('fights?select=*'),
                        supabaseFetch('gear_discounts?select=*'),
                        supabaseFetch('sponsors?select=*'),
                        supabaseFetch('profiles?select=*')
                    ]);

                    if (gymRes.data) setGyms(gymRes.data);
                    if (fightRes.data) setFights(fightRes.data);
                    if (gearRes.data) setGear(gearRes.data);
                    if (sponsorRes.data) setSponsors(sponsorRes.data);
                    if (profileRes.data) setProfiles(profileRes.data);

                    if (!SUPABASE_URL) {
                        // Mock data so the UI works in this preview
                        setGyms([{ id: 1, name: "Bangtao Muay Thai & MMA", city: "Phuket", location: "Bangtao, Thailand", upvotes: 450, disciplines: ["MMA", "Muay Thai"], metrics: { hygiene: 98, likedByMembers: 98, communityScore: 95, foodSafety: 90, safeForWomen: 96, englishSpeaking: 100 }, image_url: "https://images.unsplash.com/photo-1595079676339-1534801ad6cf" }]);
                        setGear([{ brand_name: "REST ROUND™", product_name: "HOCL Skin Spray", discount_amount: "10% OFF", discount_code: "SIGNUP10" }]);
                    }
                    setLoading(false);
                };
                loadData();
            }, []);

            const handleLike = async (id, currentUpvotes) => {
                setGyms(gyms.map(g => g.id === id ? { ...g, upvotes: (g.upvotes || 0) + 1 } : g));
                if (selectedGym && selectedGym.id === id) setSelectedGym({ ...selectedGym, upvotes: (selectedGym.upvotes || 0) + 1 });
                if (SUPABASE_URL) {
                    await supabaseFetch(`gyms?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ upvotes: (currentUpvotes || 0) + 1 }) });
                }
            };

            return (
                <div className="min-h-screen bg-white text-black selection-brand">
                    {/* NAV */}
                    <nav className="sticky top-0 z-[100] bg-white border-b border-gray-100 h-16 flex items-center justify-between px-4 md:px-6">
                        <div className="text-xl md:text-2xl font-black italic uppercase tracking-tighter cursor-pointer hover:text-[#d7df22] transition-colors" onClick={() => setView('gyms')}>
                            FIGHTER LIST
                        </div>
                        <div className="flex gap-1 md:gap-2 bg-gray-50 p-1 rounded-full shadow-inner">
                            {[
                                { id: 'gyms', label: 'Gyms', icon: 'map-pin' },
                                { id: 'fights', label: 'Fights', icon: 'swords' },
                                { id: 'gear', label: 'Gear', icon: 'shopping-bag' },
                                { id: 'sponsors', label: 'Sponsors', icon: 'target' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`flex items-center gap-2 px-4 md:px-5 py-2 rounded-full text-[9px] md:text-[10px] font-black uppercase transition-all ${view === item.id ? 'bg-black text-[#d7df22] shadow-lg' : 'text-gray-400'}`}>
                                    <Icon name={item.icon} size={14} /> <span className="hidden sm:inline">{item.label}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => setView('profile')} className={`p-2.5 rounded-full shadow-lg transition-all active:scale-90 ${view === 'profile' ? 'bg-[#d7df22] text-black border-2 border-black/5' : 'bg-black text-[#d7df22]'}`}>
                            <Icon name="user" size={20} />
                        </button>
                    </nav>

                    {/* FILTERS */}
                    {(view === 'gyms' || view === 'fights') && (
                        <div className="bg-white border-b border-gray-100 py-4 sticky top-16 z-40 px-4 md:px-6 space-y-4 shadow-sm text-left">
                            <div className="max-w-7xl mx-auto space-y-4">
                                <div className="flex items-center gap-3 overflow-x-auto no-scrollbar">
                                    <Icon name="globe" size={16} className="text-gray-300 shrink-0"/>
                                    {["Where", "Phuket", "Bangkok", "Austin", "LA", "Tokyo"].map(city => (
                                        <button key={city} onClick={() => setActiveCity(city)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${activeCity === city ? 'bg-black text-[#d7df22] border-black shadow-lg' : 'text-gray-400 border-gray-100 bg-white'}`}>{city}</button>
                                    ))}
                                </div>
                                <div className="flex items-center gap-3">
                                    <Icon name="layout-grid" size={16} className="text-gray-300 shrink-0"/>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar flex-1 items-center">
                                        {["All", "MMA", "Muay Thai", "BJJ", "Open Mat"].map(type => (
                                            <button key={type} onClick={() => setActiveType(type)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${activeType === type ? 'bg-[#d7df22] text-black border-black shadow-lg' : 'text-gray-400 border-gray-100 bg-white'}`}>{type}</button>
                                        ))}
                                        <div className="relative shrink-0 flex-1 min-w-[150px]">
                                            <Icon name="search" size={12} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300" />
                                            <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Searching" className="bg-gray-50 border border-gray-100 py-2 pl-8 pr-4 rounded-xl text-[10px] font-bold outline-none focus:border-black w-full" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="max-w-7xl mx-auto px-4 py-8 min-h-[60vh] text-center">
                        {view === 'gyms' && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {gyms.filter(g => (activeCity === "Where" || g.city === activeCity) && (activeType === "All" || g.disciplines?.includes(activeType)) && (g.name.toLowerCase().includes(searchQuery.toLowerCase()))).map(gym => (
                                    <div key={gym.id} className="bg-white rounded-[2.5rem] border border-gray-100 overflow-hidden shadow-xl cursor-pointer hover:shadow-2xl transition-all flex flex-col h-full text-left" onClick={() => setSelectedGym(gym)}>
                                        <div className="relative h-52 overflow-hidden shrink-0">
                                            <img src={gym.image_url} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                            <div className="absolute top-4 left-4 flex gap-1">{gym.disciplines?.slice(0,3).map(d => <span key={d} className="bg-black text-[#d7df22] text-[8px] font-black px-2 py-0.5 rounded uppercase">{d}</span>)}</div>
                                            <div className="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full flex items-center border border-white/10">
                                                <Icon name="heart" size={12} className="text-red-500 mr-1.5 fill-red-500" />
                                                <span className="text-[10px] font-black text-white">{gym.upvotes || 0}</span>
                                            </div>
                                        </div>
                                        <div className="p-8 flex flex-col flex-1">
                                            <div className="flex items-center gap-1.5 text-red-500 text-[10px] font-black uppercase mb-1 tracking-widest"><Icon name="map-pin" size={12} /> {gym.location}</div>
                                            <h3 className="text-xl font-black italic uppercase leading-tight mb-6">{gym.name}</h3>
                                            <button className="w-full bg-black text-[#d7df22] py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all shadow-xl">Details</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'gear' && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-left">
                                {gear.map((item, i) => (
                                    <div key={i} className="bg-white border-2 border-gray-100 p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between group hover:border-black transition-all text-black h-full">
                                        <div>
                                            <span className="bg-[#d7df22] text-black px-4 py-1 rounded-full text-[10px] font-black uppercase mb-6 inline-block border border-black/5">{item.discount_amount}</span>
                                            <p className="text-[9px] font-black text-gray-400 uppercase mb-1 tracking-widest">{item.brand_name}</p>
                                            <h4 className="text-lg font-black italic uppercase mb-6 leading-tight">{item.product_name}</h4>
                                            <div className="bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-100 flex justify-center items-center mb-6 font-mono font-black text-lg text-black">{item.discount_code}</div>
                                        </div>
                                        <button onClick={() => window.open(item.affiliate_url)} className="w-full bg-black text-[#d7df22] py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest mt-auto shadow-lg active:scale-95 transition-all">Get Deal</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="max-w-2xl mx-auto py-10 text-left">
                                <div className="bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-gray-100">
                                    <div className="bg-black p-12 text-center relative">
                                        <img src="https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-02/VOLKANOVSKI_ALEXANDER_L_02-11.png" className="w-32 h-32 rounded-full border-4 border-[#d7df22] mx-auto mb-6 object-cover bg-gray-900 shadow-2xl" />
                                        <h2 className="text-3xl font-black italic uppercase text-white tracking-tighter leading-none">Guest Athlete</h2>
                                        <p className="text-[#d7df22] text-[10px] font-black uppercase tracking-[0.4em] mt-3 bg-white/10 px-6 py-2 rounded-full inline-block italic">@PASSPORT_HOLDER</p>
                                    </div>
                                    <div className="p-12 space-y-12 bg-white">
                                        <div className="space-y-4">
                                            <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b border-gray-50 pb-3"><Icon name="home" className="text-[#d7df22]" size={16}/> Home Gym Base</div>
                                            <div className="bg-black p-8 rounded-[2.5rem] border-2 border-[#d7df22]/20 flex justify-between items-center shadow-2xl">
                                                <div className="text-white"><p className="text-[9px] font-black text-[#d7df22] uppercase mb-1">Bangtao, Thailand</p><h4 className="text-2xl font-black uppercase italic leading-none">Bangtao Muay Thai & MMA</h4></div>
                                                <Icon name="chevron-right" className="bg-[#d7df22] text-black rounded-full p-2" size={24} />
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b border-gray-50 pb-3"><Icon name="globe" className="text-[#d7df22]" size={16}/> Athlete Passport Intelligence</div>
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-center py-2 border-b border-gray-50"><span className="text-[11px] font-bold uppercase text-gray-400 tracking-widest">Visited</span><span className="font-black uppercase italic text-sm text-black text-right">Tiger Muay Thai, AKA Thailand</span></div>
                                                <div className="flex justify-between items-center py-2 border-b border-gray-50"><span className="text-[11px] font-bold uppercase text-gray-400 tracking-widest">Plan to Visit</span><span className="font-black uppercase italic text-sm text-[#d7df22] text-right">B-Team Austin, Fairtex</span></div>
                                            </div>
                                        </div>
                                        <button className="w-full bg-black text-white py-6 rounded-[1.5rem] font-black uppercase italic text-xs tracking-widest flex items-center justify-center gap-3 shadow-2xl active:scale-95 transition-all"><Icon name="settings" size={18}/> Manage Athlete Passport</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* COMPACT FOOTER */}
                    <footer className="bg-white py-12 border-t border-gray-100 text-black">
                        <div className="max-w-7xl mx-auto px-4 flex flex-wrap items-center justify-center gap-x-8 gap-y-4 text-[10px] font-black uppercase tracking-[0.2em] italic">
                            <div className="flex items-center gap-4 text-black">
                                <a href="https://instagram.com/fighterlist_com" target="_blank" className="hover:scale-110 transition-transform"><svg viewBox="0 0 24 24" className="w-4 h-4 fill-current"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
                                <a href="https://wa.me/66924692066" target="_blank" className="hover:scale-110 transition-transform"><svg viewBox="0 0 24 24" className="w-4 h-4 fill-current"><path d="M12.011 2.25c-5.385 0-9.768 4.382-9.768 9.766 0 1.721.447 3.4 1.3 4.873l-1.383 5.053 5.17-1.357c1.42.775 3.018 1.185 4.678 1.185 5.388 0 9.773-4.384 9.773-9.769 0-5.384-4.385-9.765-9.77-9.765zm5.732 13.84c-.244.686-1.216 1.253-1.684 1.332-.468.08-1.077.14-3.056-.632-2.529-1.002-4.11-3.606-4.232-3.774-.122-.167-1.03-1.373-1.03-2.616s.64-1.854.87-2.1c.23-.245.5-.306.666-.306s.334.004.478.01c.15.008.35-.04.548.43.2.477.68 1.656.74 1.774.06.118.1.254.02.41-.08.156-.122.254-.244.394-.122.14-.254.312-.363.418-.12.118-.246.248-.106.49.14.242.624 1.03 1.34 1.67.92.82 1.696 1.073 1.942 1.196.24.123.386.104.53-.06.142-.164.61-.71.774-.954.164-.244.33-.205.55-.123.23.082 1.455.688 1.706.81.25.125.418.184.478.29.06.104.06.603-.184 1.29z"/></svg></a>
                                <a href="https://x.com" target="_blank" className="hover:scale-110 transition-transform"><svg viewBox="0 0 24 24" className="w-3.5 h-3.5 fill-current"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932 6.064-6.932zm-1.292 19.49h2.039L6.486 3.24H4.298l13.311 17.403z"/></svg></a>
                            </div>
                            <span className="text-gray-300">|</span>
                            <a href="mailto:TEAM.RESTROUND@GMAIL.COM" className="hover:text-[#d7df22] transition-colors font-black uppercase">TEAM.RESTROUND@GMAIL.COM</a>
                            <span className="text-gray-300">|</span>
                            <div className="flex items-center gap-2"><span>FIGHTER LIST © 2026</span><span className="opacity-50">•</span><span>POWERED BY REST ROUND™</span></div>
                        </div>
                    </footer>

                    {/* GYM MODAL */}
                    {selectedGym && (
                        <div className="fixed inset-0 z-[400] flex items-end md:items-center justify-center p-0 md:p-8">
                            <div className="absolute inset-0 bg-black/85 backdrop-blur-md" onClick={() => setSelectedGym(null)} />
                            <div className="relative bg-white w-full max-w-5xl h-[92vh] md:h-full md:max-h-[90vh] rounded-t-[3rem] md:rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row animate-slide-up text-left">
                                <div className="md:w-2/5 relative h-64 md:h-auto shrink-0 bg-gray-100 border-b md:border-b-0 md:border-r border-gray-100">
                                    <img src={selectedGym.image_url} className="w-full h-full object-cover" />
                                    <button onClick={() => setSelectedGym(null)} className="absolute top-6 right-6 bg-black text-[#d7df22] p-2.5 rounded-full"><Icon name="x" size={24} /></button>
                                    <div className="absolute bottom-6 left-6 flex items-center bg-white/90 backdrop-blur px-5 py-3 rounded-2xl shadow-xl border border-black/5"><Icon name="heart" size={20} className="text-red-500 mr-2 fill-red-500" /><span className="text-xl font-black italic">{selectedGym.upvotes || 0}</span></div>
                                </div>
                                <div className="md:w-3/5 p-8 md:p-12 overflow-y-auto no-scrollbar space-y-10 text-black">
                                    <div className="space-y-3">
                                        <h2 className="text-3xl md:text-5xl font-black italic uppercase leading-none tracking-tighter">{selectedGym.name}</h2>
                                        <div className="flex items-center gap-2 text-gray-400 font-bold uppercase text-[11px] tracking-widest"><Icon name="map-pin" size={14} className="text-red-500"/> {selectedGym.location}</div>
                                    </div>
                                    <div className="space-y-6">
                                        <h4 className="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 border-b border-gray-100 pb-2 flex items-center gap-2"><Icon name="trophy" size={14}/> Community Intelligence</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-6">
                                            <MetricBar label="Hygiene Score" value={selectedGym.metrics?.hygiene || 98} icon="shield-check" />
                                            <MetricBar label="Liked by Members" value={selectedGym.metrics?.likedByMembers || 98} icon="heart" />
                                            <MetricBar label="Community Score" value={selectedGym.metrics?.communityScore || 95} icon="target" />
                                            <MetricBar label="Food Safety" value={selectedGym.metrics?.foodSafety || 90} icon="utensils" />
                                            <MetricBar label="English Speaking" value={selectedGym.metrics?.englishSpeaking || 100} icon="languages" />
                                            <MetricBar label="Safe for Women" value={selectedGym.metrics?.safeForWomen || 96} icon="venus" />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => handleLike(selectedGym.id, selectedGym.upvotes)} className="flex-1 bg-white border-4 border-black text-black py-6 rounded-[1.5rem] font-black uppercase italic tracking-widest text-lg flex items-center justify-center gap-3 hover:bg-[#d7df22] transition-colors shadow-xl"><Icon name="heart" size={24} className="text-red-500 fill-red-500" /> Like</button>
                                        <a href={selectedGym.website} target="_blank" className="flex-[1.5] bg-black text-[#d7df22] py-6 rounded-[1.5rem] font-black uppercase italic tracking-widest text-lg text-center shadow-xl">Visit Website</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
