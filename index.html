        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

<body class="bg-white text-black selection-brand">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = "https://eahymntxxgflqkogdfxs.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhaHltbnR4eGdmbHFrb2dkZnhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTYzODEsImV4cCI6MjA5MTEzMjM4MX0.Tg4VEgCcWHtcZYyrXcMILd3jsf8jFDM9twPL-yX8R_s"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const InstagramIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        );

        const WhatsAppIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        );

        const XIcon = ({ size = 14 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
        );

        const FBIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        );

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const CopyButton = ({ text, size = 10, showText = false, customStyle = "" }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = (e) => {
                e.stopPropagation();
                const textArea = document.body.appendChild(document.createElement("textarea"));
                textArea.value = text;
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={handleCopy} className={`flex items-center gap-1.5 px-2 py-1 rounded-lg transition-all active:scale-95 ${customStyle || (copied ? 'bg-green-50' : 'hover:bg-gray-100')}`}>
                    {showText && <span className={`text-[8px] font-black uppercase ${copied ? 'text-green-600' : 'text-gray-400'}`}>{copied ? 'Copied!' : 'Copy'}</span>}
                    <Icon name={copied ? "check" : "copy"} size={size} className={copied ? "text-green-500" : "text-gray-400"} />
                </button>
            );
        };

        const MetricBar = ({ label, value, icon, color = "bg-black" }) => (
            <div className="space-y-1.5 text-left">
                <div className="flex justify-between items-center font-black uppercase tracking-widest text-gray-500 text-[10px]">
                    <div className="flex items-center gap-1.5"><Icon name={icon} size={12} className={icon === 'heart' ? 'text-red-500 fill-red-500' : ''}/>{label}</div>
                    <span className="text-black font-black">{value || 0}%</span>
                </div>
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${value || 0}%` }} />
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState("gyms"); 
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCity, setActiveCity] = useState("Where");
            const [activeType, setActiveType] = useState("All");
            const [selectedGym, setSelectedGym] = useState(null);
            const [showPassport, setShowPassport] = useState(false);
            const [revealedSponsors, setRevealedSponsors] = useState(new Set());
            const [revealedFights, setRevealedFights] = useState(new Set());
            const [shareMenuFightId, setShareMenuFightId] = useState(null);
            const [socialExpand, setSocialExpand] = useState(null); 
            const [viewedAthlete, setViewedAthlete] = useState(null); 

            const [gyms, setGyms] = useState([]);
            const [fights, setFights] = useState([]);
            const [gear, setGear] = useState([]);
            const [sponsors, setSponsors] = useState([]);
            const [profiles, setProfiles] = useState([]);
            
            // Auth States
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [confirmPassword, setConfirmPassword] = useState("");
            const [fullName, setFullName] = useState("");
            const [authError, setAuthError] = useState("");
            const [isLogin, setIsLogin] = useState(true);

            // Profile Edit States
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [editHomeGym, setEditHomeGym] = useState("");
            const [editCurrentGym, setEditCurrentGym] = useState("");
            const [editPlannedGyms, setEditPlannedGyms] = useState("");
            const [editVisitedGyms, setEditVisitedGyms] = useState("");

            const sortGyms = (data) => {
                return [...data].sort((a, b) => {
                    const aName = a.name?.toLowerCase() || "";
                    const bName = b.name?.toLowerCase() || "";
                    const isABangtao = aName.includes("bangtao");
                    const isBBangtao = bName.includes("bangtao");
                    if (isABangtao && !isBBangtao) return -1;
                    if (!isABangtao && isBBangtao) return 1;
                    return (b.upvotes || 0) - (a.upvotes || 0) || aName.localeCompare(bName);
                });
            };

            const loadData = async () => {
                setLoading(true);
                const [gymRes, fightRes, gearRes, sponsorRes, profileRes] = await Promise.all([
                    supabase.from('gyms').select('*'),
                    supabase.from('fights').select('*').order('event_date', { ascending: true }),
                    supabase.from('gear_discounts').select('*'),
                    supabase.from('sponsors').select('*'),
                    supabase.from('profiles').select('*')
                ]);
                if (gymRes.data) setGyms(sortGyms(gymRes.data));
                if (fightRes.data) setFights(fightRes.data);
                if (gearRes.data) setGear(gearRes.data);
                if (sponsorRes.data) setSponsors(sponsorRes.data);
                if (profileRes.data) setProfiles(profileRes.data);
                setLoading(false);
            };

            useEffect(() => {
                loadData();
                supabase.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => setUser(session?.user ?? null));
                return () => subscription.unsubscribe();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError("");
                
                if (isLogin) {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) setAuthError(error.message);
                    else { setShowPassport(true); setView('gyms'); }
                } else {
                    if (password !== confirmPassword) {
                        setAuthError("Passwords do not match.");
                        return;
                    }
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: { data: { full_name: fullName } }
                    });
                    if (error) setAuthError(error.message);
                    else {
                        if (data.user) {
                            await supabase.from('profiles').insert([{ 
                                id: data.user.id, 
                                full_name: fullName || "Athlete", 
                                username: email.split('@')[0],
                                home_gym: "Not Set",
                                current_gym: "Not Set",
                                planned_gyms: "None Recorded",
                                visited_gyms: "None Recorded"
                            }]);
                        }
                        setAuthError("Success! Check email for activation.");
                        setIsLogin(true);
                    }
                }
            };

            const handleUpdateProfile = async () => {
                if (!user) return;
                const { error } = await supabase.from('profiles').update({
                    home_gym: editHomeGym,
                    current_gym: editCurrentGym,
                    planned_gyms: editPlannedGyms,
                    visited_gyms: editVisitedGyms
                }).eq('id', user.id);
                if (error) setAuthError(error.message);
                else { loadData(); setIsEditingProfile(false); }
            };

            const handleLike = async (gymId, currentLikes) => {
                const newCount = (currentLikes || 0) + 1;
                const updatedGyms = gyms.map(g => g.id === gymId ? { ...g, upvotes: newCount } : g);
                setGyms(sortGyms(updatedGyms));
                if (selectedGym && selectedGym.id === gymId) setSelectedGym({...selectedGym, upvotes: newCount});
                await supabase.from('gyms').update({ upvotes: newCount }).eq('id', gymId);
            };

            const toggleSponsorReveal = (id) => {
                const newSet = new Set(revealedSponsors);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setRevealedSponsors(newSet);
            };

            const toggleFightReveal = (id) => {
                const newSet = new Set(revealedFights);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setRevealedFights(newSet);
            };

            const toggleShareMenu = (id) => {
                setShareMenuFightId(shareMenuFightId === id ? null : id);
            };

            const AvatarStack = ({ gymId, size = "h-8 w-8" }) => {
                const attendees = profiles.filter(p => p.current_gym_id == gymId).slice(0, 3);
                return (
                    <div className={`flex -space-x-3 overflow-hidden justify-center items-center ${size.split(' ')[0]}`}>
                        {attendees.map((p, i) => (
                            <img key={i} src={p.avatar_url} className={`inline-block ${size} rounded-full ring-2 ring-white object-cover grayscale shadow-sm`} alt="user" />
                        ))}
                        {attendees.length === 0 && <span className="text-xs text-gray-300 font-black">-</span>}
                    </div>
                );
            };

            const myProfile = profiles.find(p => p.id === user?.id) || {
                full_name: "Athlete",
                username: "HOLDER",
                avatar_url: "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-02/VOLKANOVSKI_ALEXANDER_L_02-11.png",
                home_gym: "Not Set",
                current_gym: "Not Set",
                planned_gyms: "None Recorded",
                visited_gyms: "None Recorded"
            };

            useEffect(() => {
                if (user && myProfile) {
                    setEditHomeGym(myProfile.home_gym || "");
                    setEditCurrentGym(myProfile.current_gym || "");
                    setEditPlannedGyms(myProfile.planned_gyms || "");
                    setEditVisitedGyms(myProfile.visited_gyms || "");
                }
            }, [user, myProfile.id]);

            const filteredGyms = gyms.filter(g => {
                const matchesCity = activeCity === "Where" || g.city === activeCity || g.location?.includes(activeCity);
                const matchesType = activeType === "All" || g.disciplines?.includes(activeType);
                return matchesCity && matchesType && g.name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredFights = fights.filter(f => {
                const matchesCity = activeCity === "Where" || f.city === activeCity;
                const matchesType = activeType === "All" || f.fight_type?.includes(activeType);
                return matchesCity && matchesType && f.event_name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredGear = gear.filter(item => 
                item.brand_name?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                item.product_name?.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const filteredSponsors = sponsors.filter(s => 
                s.brand_name?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                s.focus?.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const handleShare = (platform, fight) => {
                const url = window.location.href;
                const text = `Check out ${fight.event_name} in ${fight.city} on Fighter List!`;
                if(platform === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
                if(platform === 'wa') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text + " " + url)}`, '_blank');
                if(platform === 'ig') window.open(`https://instagram.com`, '_blank');
            };

            const RegisterCTA = ({ title, text, fullWidth = false }) => (
                <div onClick={() => setView('auth')} className={`${fullWidth ? 'col-span-full mt-4' : 'h-full'} bg-gray-50 border-2 border-dashed border-gray-200 p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center cursor-pointer hover:border-black transition-all group animate-fade-in`}>
                    <Icon name="lock" size={32} className="text-black mb-4 group-hover:scale-110 transition-transform"/>
                    <h4 className="text-xl font-black italic uppercase text-black leading-none mb-2 tracking-tighter">{title}</h4>
                    <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest mb-6">{text}</p>
                    <button className="bg-black text-[#d7df22] px-10 py-3 rounded-full text-[10px] font-black uppercase italic shadow-lg">Sign Up</button>
                </div>
            );

            const AdBox = () => (
                <div className="bg-black rounded-[2.5rem] p-8 flex flex-col justify-between text-left h-full border border-[#d7df22]/30 shadow-2xl relative overflow-hidden group">
                    <div className="absolute top-[-20%] right-[-10%] w-64 h-64 bg-[#d7df22] opacity-10 rounded-full blur-3xl group-hover:opacity-20 transition-opacity"></div>
                    <div>
                        <span className="bg-[#d7df22] text-black text-[8px] font-black px-2 py-0.5 rounded uppercase tracking-widest mb-4 inline-block">Promoted</span>
                        <h4 className="text-xl font-black italic uppercase text-white leading-none mb-2 tracking-tighter">REST ROUND™</h4>
                        <p className="text-[#d7df22] text-[10px] font-black uppercase tracking-[0.2em] mb-6 italic leading-relaxed">High-Performance Hygiene. Engineered for Combat Athletes.</p>
                        <div className="space-y-4">
                            <p className="text-gray-400 text-[11px] leading-relaxed">Stop staph and ringworm before they stop your camp. Our HOCL Skin & Gear spray is the elite standard for recovery hygiene.</p>
                        </div>
                    </div>
                    <a href="https://restround.co" target="_blank" className="w-full bg-[#d7df22] text-black py-3 rounded-xl font-black uppercase text-[9px] tracking-[0.2em] text-center shadow-lg transition-all active:scale-95 mt-6 group-hover:bg-white">Shop Rest Round™</a>
                </div>
            );

            const GlobalAdBanner = () => (
                <div className="w-full px-4 md:px-12 py-10">
                    <a 
                        href="https://restround.co" 
                        target="_blank"
                        className="block bg-black rounded-[3rem] p-10 md:p-16 relative overflow-hidden group shadow-2xl border-4 border-[#d7df22]/20 hover:border-[#d7df22] transition-all"
                    >
                        <div className="absolute right-0 top-0 h-full w-1/3 bg-gradient-to-l from-[#d7df22]/10 to-transparent"></div>
                        <div className="flex flex-col md:flex-row items-center justify-between gap-8 relative z-10">
                            <div className="text-left space-y-4">
                                <h2 className="text-4xl md:text-6xl font-black italic uppercase text-white tracking-tighter leading-none">PROTECT YOUR CAMP</h2>
                                <p className="text-[#d7df22] text-sm md:text-lg font-black uppercase tracking-[0.3em] italic">HOCL Combat Skin & Gear Hygiene</p>
                            </div>
                            <div className="flex flex-col items-center gap-4">
                                <div className="bg-[#d7df22] text-black px-12 py-5 rounded-2xl font-black uppercase italic tracking-widest text-sm group-hover:scale-110 transition-transform">
                                    Shop REST ROUND™
                                </div>
                                <p className="text-gray-500 text-[10px] font-black uppercase tracking-widest">Engineered for the Elite</p>
                            </div>
                        </div>
                    </a>
                </div>
            );

            const getCategoryAthletes = (gymId, category) => {
                if (category === 'Here Now') return profiles.filter(p => p.current_gym_id == gymId);
                return profiles.slice(0, 4); 
            };

            const GymLink = ({ name }) => {
                const gym = gyms.find(g => g.name === name);
                return (
                    <span 
                        className={`cursor-pointer underline decoration-[#d7df22] hover:text-[#d7df22] transition-colors ${!gym ? 'opacity-50 pointer-events-none' : ''}`}
                        onClick={() => { if(gym) { setSelectedGym(gym); setView('gyms'); setViewedAthlete(null); } }}
                    >
                        {name}
                    </span>
                );
            };

            const OfferDisplay = ({ offer }) => {
                if (!offer) return <span className="text-gray-300 italic">No offer listed</span>;
                const isLink = offer.startsWith('http');
                if (isLink) {
                    return <a href={offer} target="_blank" className="text-[#d7df22] underline font-black uppercase italic break-all text-[11px] hover:text-white transition-colors">Apply / View Official Offer</a>;
                }
                return <p className="text-[12px] font-bold leading-relaxed text-black">{offer}</p>;
            };

            const ProfileSection = ({ title, content, icon }) => (
                <div className="space-y-4">
                    <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b pb-3 text-left">
                        <Icon name={icon} className="text-[#d7df22]" size={16}/> {title}
                    </div>
                    <div className="bg-black p-8 rounded-[2.5rem] border-2 border-[#d7df22]/20 flex justify-between items-center shadow-2xl text-left">
                        <div className="text-white text-left">
                            <p className="text-[9px] font-black text-[#d7df22] uppercase mb-1 italic">Dossier Sector</p>
                            <h4 className="text-2xl font-black uppercase italic leading-none">
                                <GymLink name={content || "Not Set"} />
                            </h4>
                        </div>
                        <Icon name="award" className="text-[#d7df22]" size={24} />
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white text-black selection-brand font-['Montserrat'] overflow-x-hidden">
                    {/* NAV */}
                    <nav className="sticky top-0 z-[100] bg-white border-b border-gray-100 h-16 flex items-center justify-between px-4 md:px-12 shadow-sm">
                        <div 
                            className="flex items-center gap-3 cursor-pointer group" 
                            onClick={() => {setView('gyms'); setShowPassport(false); setSelectedGym(null); setSearchQuery(""); setSocialExpand(null); setViewedAthlete(null);}}
                        >
                            <div className="w-10 h-10 md:w-12 md:h-12 bg-black rounded-xl flex items-center justify-center overflow-hidden shrink-0 shadow-lg border border-white/10 group-hover:border-[#d7df22] transition-all">
                                <svg viewBox="0 0 100 100" className="w-full h-full p-1.5">
                                    <text x="50%" y="45%" textAnchor="middle" fill="#d7df22" fontFamily="Arial Black, sans-serif" fontSize="18" fontWeight="900" style={{letterSpacing: '-1.5px'}}>FIGHTER</text>
                                    <text x="50%" y="82%" textAnchor="middle" fill="#d7df22" fontFamily="Arial Black, sans-serif" fontSize="36" fontWeight="900" style={{letterSpacing: '-1.5px'}}>LIST</text>
                                </svg>
                            </div>
                            <div className="text-xl md:text-2xl font-black italic uppercase tracking-tighter group-hover:text-[#d7df22] transition-colors leading-none">
                                FIGHTER LIST
                            </div>
                        </div>

                        <div className="flex gap-1 md:gap-2 bg-gray-50 p-1 rounded-full shadow-inner border border-gray-100">
                            {['gyms', 'fights', 'gear', 'sponsors'].map(id => (
                                <button key={id} onClick={() => {setView(id); setShowPassport(false); setViewedAthlete(null);}} className={`flex items-center gap-2 px-3 md:px-5 py-2 rounded-full text-[9px] md:text-[10px] font-black uppercase transition-all ${view === id && !showPassport ? 'bg-black text-[#d7df22] shadow-lg' : 'text-gray-400'}`}>
                                    <Icon name={id==='gyms'?'map-pin':id==='fights'?'swords':id==='gear'?'shopping-bag':'target'} size={14} /> <span className="hidden sm:inline">{id.charAt(0).toUpperCase() + id.slice(1)}</span>
                                </button>

                            <div className="absolute inset-0 bg-black/90 backdrop-blur-md animate-fade-in text-left" onClick={() => setSocialExpand(null)} />
                            <div className="relative bg-white w-full max-w-lg rounded-[3rem] overflow-hidden shadow-2xl p-8 animate-slide-up text-black text-left">
                                <button onClick={() => setSocialExpand(null)} className="absolute top-6 right-6 text-gray-300 hover:text-black transition-colors text-left"><Icon name="x" size={24} /></button>
                                <h3 className="text-2xl font-black italic uppercase mb-2 tracking-tighter text-black text-left">{socialExpand.category}</h3>
                                <p className="text-[10px] font-black uppercase text-gray-400 mb-8 italic tracking-widest text-black text-left">Sector live intelligence intelligence</p>
                                <div className="grid grid-cols-4 gap-6 overflow-y-auto max-h-[60vh] p-2 no-scrollbar text-black text-left text-center">
                                    {getCategoryAthletes(socialExpand.gymId, socialExpand.category).map((p, i) => (
                                        <div key={i} className="group cursor-pointer flex flex-col items-center gap-2 text-black text-center" onClick={() => { setViewedAthlete(p); setSocialExpand(null); setSelectedGym(null); }}>
                                            <img src={p.avatar_url} className="h-16 w-16 rounded-full border-4 border-gray-50 shadow-md object-cover grayscale hover:grayscale-0 hover:scale-110 transition-all duration-500 text-center" alt="p" />
                                            <span className="text-[7px] font-black uppercase text-gray-400 tracking-tighter truncate w-full text-center text-black">@{p.username || "athlete"}</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setSocialExpand(null)} className="w-full bg-black text-[#d7df22] py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest mt-8 shadow-xl text-black">Close Sector</button>
                            </div>
                        </div>
                    )}

                    {/* GYM DETAIL MODAL */}
                    {selectedGym && (
                        <div className="fixed inset-0 z-[400] flex items-end md:items-center justify-center p-0 md:p-8 text-black text-left">
                            <div className="absolute inset-0 bg-black/85 backdrop-blur-md animate-fade-in text-left" onClick={() => setSelectedGym(null)} />
                            <div className="relative bg-white w-full max-w-5xl h-[92vh] md:h-full md:max-h-[90vh] rounded-t-[3rem] md:rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row animate-slide-up text-left">
                                <button onClick={() => setSelectedGym(null)} className="absolute top-6 right-6 bg-black text-[#d7df22] p-2 rounded-full hover:scale-110 transition-transform z-[500] shadow-2xl text-black"><Icon name="x" size={20} /></button>
                                <div className="md:w-2/5 relative h-64 md:h-auto shrink-0 bg-gray-100 border-b md:border-b-0 md:border-r border-gray-100 overflow-hidden text-left">
                                    <img src={selectedGym.image_url || "https://images.unsplash.com/photo-1595079676339-1534801ad6cf?auto=format&fit=crop&q=80&w=800"} className="w-full h-full object-cover" alt="gym" />
                                    <div className="absolute bottom-6 left-6 flex items-center bg-white/90 backdrop-blur px-5 py-3 rounded-2xl shadow-xl border border-black/5 text-black shadow-inner"><Icon name="heart" size={20} className="text-red-500 mr-2 fill-red-500 text-black" /><span className="text-xl font-black italic text-black">{selectedGym.upvotes || 0}</span></div>
                                </div>
                                <div className="md:w-3/5 p-8 md:p-12 overflow-y-auto no-scrollbar space-y-10 text-black text-left">
                                    <div className="space-y-3 text-black text-left"><div className="flex items-center gap-4 text-black text-left text-left"><h2 className="text-xl md:text-3xl font-black italic uppercase tracking-tighter leading-none text-black text-left">{selectedGym.name}</h2><button onClick={() => handleLike(selectedGym.id, selectedGym.upvotes)} className="hover:scale-110 transition-transform active:scale-90 flex items-center gap-1.5 text-black shadow-inner"><Icon name="heart" size={18} className="text-red-500 fill-red-500 text-black" /><span className="text-[10px] font-black text-gray-400 text-black">{selectedGym.upvotes || 0}</span></button></div><div className="flex items-center gap-2 text-gray-400 font-bold uppercase text-[11px] tracking-widest text-left text-black italic text-left"><Icon name="map-pin" size={14} className="text-red-500 text-black"/> {selectedGym.location || selectedGym.city}</div></div>
                                    <div className="bg-[#d7df22]/5 border-2 border-[#d7df22]/20 p-8 rounded-[2.5rem] grid grid-cols-3 gap-1 text-center shadow-inner text-black"><div className="border-r border-[#d7df22]/20 space-y-3 hover:bg-black/5 transition-colors cursor-pointer py-2 rounded-xl shadow-inner" onClick={() => setSocialExpand({ gymId: selectedGym.id, category: 'Here Now' })}><p className="text-[8px] font-black text-gray-400 uppercase tracking-widest italic text-black">Here Now</p><AvatarStack gymId={selectedGym.id} size="h-10 w-10" /></div><div className="border-r border-[#d7df22]/20 space-y-3 hover:bg-black/5 transition-colors cursor-pointer py-2 rounded-xl shadow-inner" onClick={() => setSocialExpand({ gymId: selectedGym.id, category: 'Visit Soon' })}><p className="text-[8px] font-black text-gray-400 uppercase tracking-widest italic text-black">Visit Soon</p><span className="text-2xl font-black block text-black">-</span></div><div className="space-y-3 hover:bg-black/5 transition-colors cursor-pointer py-2 rounded-xl shadow-inner" onClick={() => setSocialExpand({ gymId: selectedGym.id, category: 'Was Here' })}><p className="text-[8px] font-black text-gray-400 uppercase tracking-widest italic text-black text-black">Was Here</p><span className="text-2xl font-black block text-black">-</span></div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8 text-left text-black text-left"><MetricBar label="Hygiene" value={selectedGym.hygiene_score} icon="shield-check" /><MetricBar label="Food Safety" value={selectedGym.food_safety} icon="utensils" /><MetricBar label="English Speaking" value={selectedGym.english_score} icon="languages" /><MetricBar label="Safe for Women" value={selectedGym.safe_for_women} icon="venus" /></div>
                                    <div className="flex gap-4 pt-4 text-black text-left"><a href={selectedGym.website} target="_blank" className="w-full bg-black text-[#d7df22] py-4 rounded-xl font-black uppercase italic tracking-[0.2em] text-[11px] text-center shadow-lg active:scale-95 transition-all flex items-center justify-center uppercase shadow-inner">Visit Gym Website</a></div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
