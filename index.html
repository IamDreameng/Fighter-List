<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter List | Powered by REST ROUND™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .selection-brand::selection { background: #d7df22; color: black; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideIn 0.3s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white text-black selection-brand">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = "https://eahymntxxgflqkogdfxs.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhaHltbnR4eGdmbHFrb2dkZnhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTYzODEsImV4cCI6MjA5MTEzMjM4MX0.Tg4VEgCcWHtcZYyrXcMILd3jsf8jFDM9twPL-yX8R_s"; 

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Brand Specific Icons ---
        const InstagramIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        );

        const WhatsAppIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        );

        const XIcon = ({ size = 14 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
        );

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const CopyButton = ({ text }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = (e) => {
                e.stopPropagation();
                const textArea = document.body.appendChild(document.createElement("textarea"));
                textArea.value = text;
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={handleCopy} className="p-1 hover:bg-gray-100 rounded transition-all active:scale-90">
                    <Icon name={copied ? "check" : "copy"} size={10} className={copied ? "text-green-500" : "text-gray-400"} />
                </button>
            );
        };

        const MetricBar = ({ label, value, icon, color = "bg-black" }) => (
            <div className="space-y-1.5 text-left">
                <div className="flex justify-between items-center font-black uppercase tracking-widest text-gray-500 text-[10px]">
                    <div className="flex items-center gap-1.5"><Icon name={icon} size={12} className={icon === 'heart' ? 'text-red-500 fill-red-500' : ''}/>{label}</div>
                    <span className="text-black font-black">{value || 0}%</span>
                </div>
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${value || 0}%` }} />
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState("gyms"); 
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCity, setActiveCity] = useState("Where");
            const [activeType, setActiveType] = useState("All");
            const [selectedGym, setSelectedGym] = useState(null);
            const [showPassport, setShowPassport] = useState(false);
            const [revealedSponsors, setRevealedSponsors] = useState(new Set());

            const [gyms, setGyms] = useState([]);
            const [fights, setFights] = useState([]);
            const [gear, setGear] = useState([]);
            const [sponsors, setSponsors] = useState([]);
            const [profiles, setProfiles] = useState([]);
            
            // Auth State
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [fullName, setFullName] = useState("");
            const [authError, setAuthError] = useState("");
            const [isLogin, setIsLogin] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    setLoading(true);
                    const [gymRes, fightRes, gearRes, sponsorRes, profileRes] = await Promise.all([
                        supabase.from('gyms').select('*').order('upvotes', { ascending: false }),
                        supabase.from('fights').select('*'),
                        supabase.from('gear_discounts').select('*'),
                        supabase.from('sponsors').select('*'),
                        supabase.from('profiles').select('*')
                    ]);
                    if (gymRes.data) setGyms(gymRes.data);
                    if (fightRes.data) setFights(fightRes.data);
                    if (gearRes.data) setGear(gearRes.data);
                    if (sponsorRes.data) setSponsors(sponsorRes.data);
                    if (profileRes.data) setProfiles(profileRes.data);
                    setLoading(false);
                };
                loadData();
                supabase.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => setUser(session?.user ?? null));
                return () => subscription.unsubscribe();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError("");
                if (isLogin) {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) setAuthError(error.message);
                    else { setShowPassport(true); setView('gyms'); }
                } else {
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: { data: { full_name: fullName } }
                    });
                    if (error) setAuthError(error.message);
                    else {
                        if (data.user) {
                            await supabase.from('profiles').insert([{ 
                                id: data.user.id, 
                                full_name: fullName || "Athlete", 
                                username: email.split('@')[0] 
                            }]);
                        }
                        setAuthError("Passport Created! Please check your email to confirm activation.");
                        setIsLogin(true);
                    }
                }
            };

            const handleLike = async (gymId, currentLikes) => {
                const newCount = (currentLikes || 0) + 1;
                setGyms(gyms.map(g => g.id === gymId ? { ...g, upvotes: newCount } : g));
                if (selectedGym && selectedGym.id === gymId) setSelectedGym({...selectedGym, upvotes: newCount});
                await supabase.from('gyms').update({ upvotes: newCount }).eq('id', gymId);
            };

            const toggleSponsorReveal = (id) => {
                const newSet = new Set(revealedSponsors);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setRevealedSponsors(newSet);
            };

            const AvatarStack = ({ gymId }) => {
                const attendees = profiles.filter(p => p.current_gym_id == gymId).slice(0, 3);
                return (
                    <div className="flex -space-x-1.5 overflow-hidden justify-center items-center h-5">
                        {attendees.map((p, i) => (
                            <img key={i} src={p.avatar_url} className="inline-block h-4 w-4 rounded-full ring-1 ring-white object-cover grayscale" alt="user" />
                        ))}
                        {attendees.length === 0 && <span className="text-[10px] text-gray-200 font-black">-</span>}
                    </div>
                );
            };

            const profile = profiles.find(p => p.id === user?.id) || {
                full_name: "Guest Athlete",
                username: "PASSPORT_HOLDER",
                avatar_url: "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-02/VOLKANOVSKI_ALEXANDER_L_02-11.png"
            };

            const filteredGyms = gyms.filter(g => {
                const matchesCity = activeCity === "Where" || g.city === activeCity || g.location?.includes(activeCity);
                const matchesType = activeType === "All" || g.disciplines?.includes(activeType);
                return matchesCity && matchesType && g.name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredFights = fights.filter(f => {
                const matchesCity = activeCity === "Where" || f.city === activeCity;
                const matchesType = activeType === "All" || f.fight_type?.includes(activeType);
                return matchesCity && matchesType && f.event_name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            return (
                <div className="min-h-screen bg-white text-black selection-brand font-['Montserrat']">
                    {/* NAV */}
                    <nav className="sticky top-0 z-[100] bg-white border-b border-gray-100 h-16 flex items-center justify-between px-4 md:px-6">
                        <div className="text-xl md:text-2xl font-black italic uppercase tracking-tighter cursor-pointer hover:text-[#d7df22] transition-colors" onClick={() => {setView('gyms'); setShowPassport(false);}}>
                            FIGHTER LIST
                        </div>
                        <div className="flex gap-1 md:gap-2 bg-gray-50 p-1 rounded-full shadow-inner">
                            {[
                                { id: 'gyms', label: 'Gyms', icon: 'map-pin' },
                                { id: 'fights', label: 'Fights', icon: 'swords' },
                                { id: 'gear', label: 'Gear', icon: 'shopping-bag' },
                                { id: 'sponsors', label: 'Sponsors', icon: 'target' }
                            ].map(item => (
                                <button key={item.id} onClick={() => {setView(item.id); setShowPassport(false);}} className={`flex items-center gap-2 px-4 md:px-5 py-2 rounded-full text-[9px] md:text-[10px] font-black uppercase transition-all ${view === item.id && !showPassport ? 'bg-black text-[#d7df22] shadow-lg' : 'text-gray-400'}`}>
                                    <Icon name={item.icon} size={14} /> <span className="hidden sm:inline">{item.label}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => user ? setShowPassport(!showPassport) : setView('auth')} className={`p-2.5 rounded-full shadow-lg transition-all active:scale-90 ${showPassport || view === 'auth' ? 'bg-[#d7df22] text-black border-2 border-black/5' : 'bg-black text-[#d7df22]'}`}>
                            <Icon name="user" size={20} />
                        </button>
                    </nav>

                    {/* FILTER STRIP */}
                    {(view === 'gyms' || view === 'fights') && !showPassport && (
                        <div className="bg-white border-b border-gray-100 py-4 sticky top-16 z-40 px-4 md:px-6 space-y-4 shadow-sm text-left">
                            <div className="max-w-7xl mx-auto space-y-4">
                                <div className="flex items-center gap-3 overflow-x-auto no-scrollbar text-black">
                                    <Icon name="globe" size={16} className="text-gray-300 shrink-0"/>
                                    {["Where", "Phuket", "Patong", "Perth", "Bangkok", "Austin", "LA"].map(city => (
                                        <button key={city} onClick={() => setActiveCity(city)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${activeCity === city ? 'bg-black text-[#d7df22] border-black shadow-lg' : 'text-gray-400 border-gray-100 bg-white'}`}>{city}</button>
                                    ))}
                                </div>
                                <div className="flex items-center gap-3 text-black">
                                    <Icon name="layout-grid" size={16} className="text-gray-300 shrink-0"/>
                                    <div className="flex gap-2 items-center overflow-x-auto no-scrollbar">
                                        {["All", "MMA", "Muay Thai", "BJJ", "Flyweight", "Bantamweight", "Featherweight"].map(type => (
                                            <button key={type} onClick={() => setActiveType(type)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${activeType === type ? 'bg-[#d7df22] text-black border-black shadow-lg' : 'text-gray-400 border-gray-100 bg-white'}`}>{type}</button>
                                        ))}
                                        <div className="relative shrink-0 flex-1 min-w-[150px]">
                                            <Icon name="search" size={12} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300" />
                                            <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Searching" className="bg-gray-50 border border-gray-100 py-2 pl-8 pr-4 rounded-xl text-[10px] font-bold outline-none focus:border-black w-full text-black" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="max-w-7xl mx-auto px-4 py-8 min-h-[60vh] text-center">
                        {loading ? (
                            <div className="py-20 text-gray-400 font-black uppercase tracking-[0.3em] animate-pulse italic text-center">Connecting Intelligence...</div>
                        ) : (
                          <div className="animate-in fade-in duration-500">
                            
                            {/* AUTH VIEW */}
                            {view === 'auth' && !user && (
                                <div className="max-w-md mx-auto py-10 text-left">
                                    <div className="bg-white rounded-[3rem] shadow-2xl border border-gray-100 p-10">
                                        <h2 className="text-3xl font-black italic uppercase text-black mb-2 leading-none tracking-tighter">
                                            {isLogin ? "Athlete Login" : "Create Passport"}
                                        </h2>
                                        <p className="text-[9px] font-black uppercase text-gray-400 tracking-widest mb-8">Join the elite combat directory</p>
                                        
                                        <form onSubmit={handleAuth} className="space-y-4">
                                            {!isLogin && (
                                                <div>
                                                    <p className="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-2">Full Name</p>
                                                    <input type="text" placeholder="Alex Volkanovski" value={fullName} onChange={(e) => setFullName(e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-black text-black" required />
                                                </div>
                                            )}
                                            <div>
                                                <p className="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-2">Email</p>
                                                <input type="email" placeholder="athlete@fighterlist.com" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-black text-black" required />
                                            </div>
                                            <div>
                                                <p className="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-2">Password</p>
                                                <input type="password" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-black text-black" required />
                                            </div>
                                            
                                            {authError && <p className={`text-[10px] font-black uppercase tracking-tight ${authError.includes('Success') ? 'text-green-500' : 'text-red-500'}`}>{authError}</p>}
                                            
                                            <button type="submit" className="w-full bg-black text-[#d7df22] py-5 rounded-[1.5rem] font-black uppercase italic tracking-widest shadow-xl active:scale-95 transition-all">
                                                {isLogin ? "Enter Dashboard" : "Join the List"}
                                            </button>
                                            
                                            <p className="text-center text-[9px] font-black uppercase text-gray-400 cursor-pointer pt-2" onClick={() => { setIsLogin(!isLogin); setAuthError(""); }}>
                                                {isLogin ? "New athlete? Register here" : "Already registered? Login"}
                                            </p>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* PASSPORT VIEW */}
                            {showPassport && user && (
                                <div className="max-w-2xl mx-auto py-10 text-left animate-slide-up">
                                    <div className="bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-gray-100">
                                        <div className="bg-black p-12 text-center relative">
                                            <button onClick={() => {supabase.auth.signOut(); setShowPassport(false);}} className="absolute top-6 right-6 text-[#d7df22] hover:text-white transition-colors"><Icon name="log-out" size={18} /></button>
                                            <img src={profile.avatar_url} className="w-32 h-32 rounded-full border-4 border-[#d7df22] mx-auto mb-6 object-cover bg-gray-900 shadow-2xl" alt="Athlete" />
                                            <h2 className="text-3xl font-black italic uppercase text-white tracking-tighter leading-none">{profile.full_name}</h2>
                                            <p className="text-[#d7df22] text-[10px] font-black uppercase tracking-[0.4em] mt-3 bg-white/10 px-6 py-2 rounded-full inline-block italic">@{profile.username}</p>
                                        </div>
                                        <div className="p-12 space-y-12 bg-white text-black text-left">
                                            <div className="space-y-4">
                                                <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b pb-3"><Icon name="home" className="text-[#d7df22]" size={16}/> Home Gym Base</div>
                                                <div className="bg-black p-8 rounded-[2.5rem] border-2 border-[#d7df22]/20 flex justify-between items-center shadow-2xl">
                                                    <div className="text-white"><p className="text-[9px] font-black text-[#d7df22] uppercase mb-1 italic">Current Base</p><h4 className="text-2xl font-black uppercase italic leading-none">{profile.home_gym || "Not Set"}</h4></div>
                                                    <Icon name="chevron-right" className="bg-[#d7df22] text-black rounded-full p-2" size={24} />
                                                </div>
                                            </div>
                                            <div className="space-y-6">
                                                <div className="flex items-center gap-2 text-gray-400 font-black text-[10px] uppercase tracking-widest border-b border-gray-50 pb-3"><Icon name="globe" className="text-[#d7df22]" size={16}/> Athlete Passport Intelligence</div>
                                                <div className="space-y-4 text-left">
                                                    <div className="flex justify-between items-center py-2 border-b border-gray-50"><span className="text-[11px] font-bold uppercase text-gray-400 tracking-widest">Visited</span><span className="font-black uppercase italic text-sm text-black text-right">{profile.visited_gyms || "None Recorded"}</span></div>
                                                    <div className="flex justify-between items-center py-2 border-b border-gray-50"><span className="text-[11px] font-bold uppercase text-gray-400 tracking-widest">Plan to Visit</span><span className="font-black uppercase italic text-sm text-[#d7df22] text-right">{profile.planned_gyms || "None Recorded"}</span></div>
                                                </div>
                                            </div>
                                            <button className="w-full bg-black text-white py-6 rounded-[1.5rem] font-black uppercase italic text-xs tracking-widest flex items-center justify-center gap-3 shadow-2xl active:scale-95 transition-all"><Icon name="settings" size={18}/> Manage Athlete Passport</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* GYMS VIEW */}
                            {view === 'gyms' && !showPassport && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {filteredGyms.map(gym => (
                                        <div key={gym.id} className="bg-white rounded-[2.5rem] border border-gray-100 overflow-hidden shadow-xl cursor-pointer hover:shadow-2xl transition-all group flex flex-col h-full text-left" onClick={() => setSelectedGym(gym)}>
                                            <div className="relative h-52 overflow-hidden bg-gray-50 shrink-0">
                                                <img src={gym.image_url || "https://images.unsplash.com/photo-1595079676339-1534801ad6cf?auto=format&fit=crop&q=80&w=800"} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="gym" />
                                                <div className="absolute top-4 left-4 flex gap-1">{gym.disciplines?.slice(0,3).map(d => <span key={d} className="bg-black/80 text-[#d7df22] text-[8px] font-black px-2 py-0.5 rounded uppercase tracking-widest">{d}</span>)}</div>
                                            </div>
                                            <div className="p-8 flex flex-col flex-1 text-black">
                                                <div className="flex items-center gap-1.5 text-gray-400 font-bold uppercase text-[9px] tracking-widest mb-1"><Icon name="map-pin" size={12} className="text-red-500" /> {gym.location || gym.city}</div>
                                                <div className="flex justify-between items-center mb-6">
                                                    <h3 className="text-base font-black italic uppercase text-black leading-tight truncate mr-2">{gym.name}</h3>
                                                    <div className="flex items-center gap-1.5 shrink-0">
                                                        <button onClick={(e) => { e.stopPropagation(); handleLike(gym.id, gym.upvotes); }} className="hover:scale-110 transition-transform active:scale-95"><Icon name="heart" size={16} className="text-red-500 fill-red-500" /></button>
                                                        <span className="text-[10px] font-black text-gray-400">{gym.upvotes || 0}</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="grid grid-cols-3 gap-1 py-4 border-y border-gray-50 mb-6 mt-auto text-center">
                                                    <div className="border-r border-gray-50"><p className="text-[7px] font-black text-gray-300 uppercase leading-none mb-2 tracking-tighter">Here Now</p><AvatarStack gymId={gym.id} /></div>
                                                    <div className="border-r border-gray-50"><p className="text-[7px] font-black text-gray-400 uppercase leading-none mb-2 tracking-tighter">Was Here</p><span className="text-[10px] text-gray-200 font-black">-</span></div>
                                                    <div><p className="text-[7px] font-black text-gray-300 uppercase leading-none mb-2 tracking-tighter">Visit Soon</p><span className="text-[10px] text-gray-200 font-black">-</span></div>
                                                </div>

                                                <button className="w-full bg-black text-[#d7df22] py-2.5 rounded-xl font-black uppercase text-[8px] tracking-[0.2em] active:scale-95 transition-all shadow-md">Details</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* GEAR VIEW (Conditional Box Display) */}
                            {view === 'gear' && (
                                <div className="space-y-10 text-left text-black">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter text-black leading-none">GEAR DISCOUNTS</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {(user ? gear : gear.slice(0, 5)).map((item, i) => (
                                            <div key={i} className="bg-white border-2 border-gray-100 p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between group hover:border-black transition-all text-black h-full">
                                                <div>
                                                    <span className="bg-[#d7df22] text-black px-4 py-1 rounded-full text-[10px] font-black uppercase mb-6 inline-block border border-black/5 shadow-sm">{item.discount_amount}</span>
                                                    <p className="text-[9px] font-black text-gray-400 uppercase mb-1 tracking-widest">{item.brand_name}</p>
                                                    <h4 className="text-lg font-black italic uppercase mb-6 leading-tight">{item.product_name}</h4>
                                                    <div className="bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-100 flex justify-between items-center mb-6 font-mono font-black text-lg text-black">
                                                        <span>{item.discount_code}</span>
                                                        <CopyButton text={item.discount_code} />
                                                    </div>
                                                </div>
                                                <button onClick={() => window.open(item.affiliate_url)} className="w-full bg-black text-[#d7df22] py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest mt-auto shadow-lg active:scale-95 transition-all">Get Deal</button>
                                            </div>
                                        ))}
                                        {!user && gear.length > 5 && (
                                            <div onClick={() => setView('auth')} className="bg-white border-2 border-dashed border-gray-200 p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center cursor-pointer hover:border-black transition-all shadow-xl active:scale-95">
                                                <Icon name="lock" size={40} className="text-black mb-4"/>
                                                <h4 className="text-xl font-black italic uppercase text-black leading-none mb-2">Register to Unlock</h4>
                                                <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest mb-6">See 20+ hidden combat gear discounts</p>
                                                <button className="bg-black text-[#d7df22] px-8 py-3 rounded-full text-[10px] font-black uppercase italic shadow-lg">Join the List</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* SPONSORS VIEW (Conditional Box Display) */}
                            {view === 'sponsors' && (
                                <div className="space-y-10 text-left text-black">
                                    <div className="bg-[#d7df22] p-12 rounded-[3rem] text-black shadow-2xl relative overflow-hidden">
                                        <div className="absolute right-[-5%] top-[-10%] opacity-10 rotate-12"><Icon name="target" size={200} /></div>
                                        <h2 className="text-4xl md:text-5xl font-black italic uppercase tracking-tighter mb-4 leading-none">Sponsors guide</h2>
                                        <p className="max-w-xl font-bold text-sm leading-loose opacity-80 uppercase tracking-widest text-black">Sponsorship is a partnership. Here are the elite brands looking to sponsor active combat athletes.</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-stretch">
                                        {(user ? sponsors : sponsors.slice(0, 5)).map(s => (
                                            <div key={s.id} className="bg-white border-2 border-gray-100 p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between hover:border-black transition-all text-black">
                                                <div>
                                                    <h3 className="text-xl font-black italic uppercase mb-1 leading-none">{s.brand_name}</h3>
                                                    <p className="text-[#d7df22] font-black uppercase text-[8px] tracking-[0.2em] bg-black inline-block px-2 py-0.5 rounded mb-8">{s.focus}</p>
                                                    <div className="space-y-4 mb-8 text-left">
                                                        <div className="bg-gray-50 p-4 rounded-2xl"><p className="text-[8px] font-black text-gray-400 uppercase mb-1 tracking-widest italic">Requirement</p><p className="text-[10px] font-bold leading-tight">{s.requirements}</p></div>
                                                        <div className="bg-gray-50 p-4 rounded-2xl"><p className="text-[8px] font-black text-gray-400 uppercase mb-1 tracking-widest italic">Offer</p><p className="text-[10px] font-bold leading-tight">{s.offer}</p></div>
                                                    </div>
                                                </div>
                                                <button onClick={() => { if(!user) setView('auth'); else toggleSponsorReveal(s.id); }} className="w-full py-4 rounded-2xl font-black uppercase italic tracking-widest text-[10px] bg-black text-white hover:bg-[#d7df22] hover:text-black transition-all mt-auto flex items-center justify-center gap-2 shadow-xl">
                                                    {revealedSponsors.has(s.id) ? (
                                                        <span className="flex items-center gap-2 uppercase font-bold">{s.email || 'team.restround@gmail.com'} <CopyButton text={s.email || 'team.restround@gmail.com'}/></span>
                                                    ) : (
                                                        <><Icon name="lock" size={14}/> {user ? 'Reveal Email' : 'Register to Reveal'}</>
                                                    )}
                                                </button>
                                            </div>
                                        ))}
                                        {!user && sponsors.length > 5 && (
                                            <div onClick={() => setView('auth')} className="bg-white border-2 border-dashed border-gray-200 p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center cursor-pointer hover:border-black transition-all shadow-xl active:scale-95">
                                                <Icon name="target" size={40} className="text-black mb-4"/>
                                                <h4 className="text-xl font-black italic uppercase text-black leading-none mb-2">Unlock More</h4>
                                                <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest mb-6">Connect with brands looking to sponsor fighters</p>
                                                <button className="bg-black text-[#d7df22] px-8 py-3 rounded-full text-[10px] font-black uppercase italic shadow-lg">Join the List</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* FIGHTS VIEW */}
                            {view === 'fights' && (
                                <div className="max-w-4xl mx-auto space-y-4 text-left text-black">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter mb-10 text-black leading-none">Community Updates</h2>
                                    {filteredFights.map(f => (
                                        <div key={f.id} className="bg-white border-2 border-black p-6 rounded-[2rem] flex items-center justify-between shadow-xl text-black">
                                            <div className="flex items-center gap-8 text-left">
                                                <div className="bg-gray-50 p-4 rounded-2xl text-center min-w-[90px] border border-gray-100 shadow-inner">
                                                    <p className="text-[10px] font-black text-gray-400 uppercase leading-none mb-1">{f.event_date?.split(' ')[0]}</p>
                                                    <p className="text-2xl font-black italic tracking-tighter">{f.event_date?.split(' ')[1] || ""}</p>
                                                </div>
                                                <div className="text-left space-y-1">
                                                    <span className="bg-[#d7df22] text-black px-3 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest">{f.fight_type}</span>
                                                    <h3 className="text-2xl font-black italic uppercase mt-1 leading-tight">{f.event_name}</h3>
                                                    <div className="flex items-center gap-4">
                                                        <p className="text-gray-400 font-bold uppercase text-[10px] flex items-center gap-1.5 tracking-widest"><Icon name="map-pin" size={12} className="text-red-500" /> {f.city}</p>
                                                        <div className="flex items-center gap-1 bg-gray-50 px-2 py-0.5 rounded border border-gray-100">
                                                            <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">{f.contact_info}</p>
                                                            <CopyButton text={f.contact_info} />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={() => window.location.href=`mailto:${f.contact_info}`} className="bg-black text-white px-8 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest active:scale-95 shadow-lg hover:bg-[#d7df22] hover:text-black transition-all">Contact</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                          </div>
                        )}
                    </main>

                    {/* COMPACT UNIFIED FOOTER */}
                    <footer className="bg-white py-12 border-t border-gray-100 text-black">
                        <div className="max-w-7xl mx-auto px-4 flex flex-wrap items-center justify-center gap-x-8 gap-y-4 text-[10px] font-black uppercase tracking-[0.2em] italic whitespace-nowrap">
                            <div className="flex items-center gap-4 text-black">
                                <a href="https://instagram.com/fighterlist_com" target="_blank" className="hover:scale-110 transition-transform active:scale-90"><InstagramIcon size={16}/></a>
                                <a href="https://wa.me/66924692066" target="_blank" className="hover:scale-110 transition-transform active:scale-90"><WhatsAppIcon size={16}/></a>
                                <a href="https://x.com" target="_blank" className="hover:scale-110 transition-transform active:scale-90"><XIcon size={14}/></a>
                            </div>
                            <span className="text-gray-300 hidden md:inline">/</span>
                            <a href="mailto:TEAM.RESTROUND@GMAIL.COM" className="hover:text-[#d7df22] transition-colors font-black uppercase tracking-tight">TEAM.RESTROUND@GMAIL.COM</a>
                            <span className="text-gray-300 hidden md:inline">/</span>
                            <div className="flex items-center gap-2 font-black uppercase">
                                <span>FIGHTER LIST © 2026</span>
                                <span className="opacity-30 font-normal ml-1 mr-1">•</span>
                                <span>POWERED BY REST ROUND™</span>
                            </div>
                        </div>
                    </footer>

                    {/* GYM DETAIL MODAL */}
                    {selectedGym && (
                        <div className="fixed inset-0 z-[400] flex items-end md:items-center justify-center p-0 md:p-8">
                            <div className="absolute inset-0 bg-black/85 backdrop-blur-md animate-fade-in" onClick={() => setSelectedGym(null)} />
                            <div className="relative bg-white w-full max-w-5xl h-[92vh] md:h-full md:max-h-[90vh] rounded-t-[3rem] md:rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row animate-slide-up text-left">
                                <button onClick={() => setSelectedGym(null)} className="absolute top-4 right-4 bg-black text-[#d7df22] p-2 rounded-full hover:scale-110 transition-transform z-[500] shadow-2xl"><Icon name="x" size={20} /></button>
                                
                                <div className="md:w-2/5 relative h-64 md:h-auto shrink-0 bg-gray-100 border-b md:border-b-0 md:border-r border-gray-100 overflow-hidden">
                                    <img src={selectedGym.image_url || "https://images.unsplash.com/photo-1595079676339-1534801ad6cf?auto=format&fit=crop&q=80&w=800"} className="w-full h-full object-cover" alt="gym" />
                                    <div className="absolute bottom-6 left-6 flex items-center bg-white/90 backdrop-blur px-5 py-3 rounded-2xl shadow-xl border border-black/5">
                                        <Icon name="heart" size={20} className="text-red-500 mr-2 fill-red-500" />
                                        <span className="text-xl font-black italic">{selectedGym.upvotes || 0}</span>
                                    </div>
                                </div>
                                <div className="md:w-3/5 p-8 md:p-12 overflow-y-auto no-scrollbar space-y-10 text-black text-left">
                                    <div className="space-y-3 text-left">
                                        <div className="flex items-center gap-4">
                                            <h2 className="text-xl md:text-2xl font-black italic uppercase leading-none text-black tracking-tighter">{selectedGym.name}</h2>
                                            <button onClick={() => handleLike(selectedGym.id, selectedGym.upvotes)} className="hover:scale-110 transition-transform active:scale-90 flex items-center gap-1.5">
                                                <Icon name="heart" size={20} className="text-red-500 fill-red-500" />
                                                <span className="text-[10px] font-black text-gray-400">{selectedGym.upvotes || 0}</span>
                                            </button>
                                        </div>
                                        <div className="flex items-center gap-2 text-gray-400 font-bold uppercase text-[11px] tracking-widest text-left"><Icon name="map-pin" size={14} className="text-red-500"/> {selectedGym.location || selectedGym.city}</div>
                                    </div>

                                    <div className="bg-[#d7df22]/5 border-2 border-[#d7df22]/20 p-8 rounded-[2.5rem] space-y-8 shadow-inner">
                                        <div className="flex items-center gap-3 text-black font-black text-[10px] uppercase tracking-widest"><Icon name="users" size={20} /> Athlete Directory</div>
                                        <div className="grid grid-cols-1 gap-10 text-left">
                                            <div className="space-y-4">
                                                <h5 className="text-[8px] font-black uppercase text-gray-400 tracking-widest border-b pb-2 italic">Training Here Now</h5>
                                                <div className="flex flex-wrap gap-4">
                                                    {profiles.filter(p => p.current_gym_id == selectedGym.id).map((p, i) => (
                                                        <img key={i} src={p.avatar_url} className="w-16 h-16 rounded-full border-4 border-white shadow-xl object-cover grayscale hover:grayscale-0 transition-all duration-500" alt="p" />
                                                    ))}
                                                    {profiles.filter(p => p.current_gym_id == selectedGym.id).length === 0 && <span className="text-[10px] text-gray-300 font-black uppercase tracking-widest">No public profiles listed.</span>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-6 text-black">
                                        <h4 className="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 border-b border-gray-100 pb-2 flex items-center gap-2 text-left"><Icon name="trophy" size={14}/> Community Intelligence</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-6 text-left">
                                            <MetricBar label="Hygiene Score" value={selectedGym.hygiene_score} icon="shield-check" />
                                            <MetricBar label="Liked by Members" value={selectedGym.liked_by_members} icon="heart" />
                                            <MetricBar label="Community Score" value={selectedGym.community_score} icon="target" />
                                            <MetricBar label="Food Safety" value={selectedGym.food_safety} icon="utensils" />
                                            <MetricBar label="English Speaking" value={selectedGym.english_score} icon="languages" />
                                            <MetricBar label="Safe for Women" value={selectedGym.safe_for_women} icon="venus" />
                                        </div>
                                    </div>

                                    <div className="flex gap-4 pt-4">
                                        <a href={selectedGym.website} target="_blank" className="w-full bg-black text-[#d7df22] py-3 rounded-xl font-black uppercase italic tracking-[0.2em] text-[10px] text-center shadow-lg active:scale-95 transition-all flex items-center justify-center uppercase">Visit Website</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
